<!doctype html>
<html lang="pt-BR" class="h-full bg-[#121214]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Koda OS</title>
    <link
      id="dynamic-favicon"
      rel="shortcut icon"
      href="/static/logo.png"
      type="image/png"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      /* Scrollbars ultra sutis e modernas */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #121214;
      }
      ::-webkit-scrollbar-thumb {
        background: #232329;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #2d2d35;
      }

      /* Estilização do Markdown renderizado (Mais espaçado e legível) */
      .markdown-content p {
        margin-bottom: 1rem;
        line-height: 1.6;
      }
      .markdown-content p:last-child {
        margin-bottom: 0;
      }
      .markdown-content strong {
        color: #ffffff;
        font-weight: 600;
      }
      .markdown-content ul,
      .markdown-content ol {
        margin-bottom: 1rem;
        padding-left: 1.5rem;
      }
      .markdown-content ul {
        list-style-type: disc;
      }
      .markdown-content ol {
        list-style-type: decimal;
      }
      .markdown-content li {
        margin-bottom: 0.5rem;
        line-height: 1.6;
      }
      .markdown-content pre {
        background-color: #16161a;
        border: 1px solid #232329;
        padding: 1.25rem;
        border-radius: 0.75rem;
        margin: 1.25rem 0;
        overflow-x: auto;
        font-family: monospace;
        font-size: 0.875rem;
      }
      .markdown-content code {
        font-family: monospace;
        background-color: #1e1e24;
        padding: 0.2rem 0.4rem;
        border-radius: 0.375rem;
        font-size: 0.85em;
        color: #f87171;
      }
      .markdown-content pre code {
        background-color: transparent;
        padding: 0;
        color: #e4e4e7;
      }
    </style>
  </head>
  <body
    class="h-full text-[#d4d4d8] font-sans flex antialiased overflow-hidden bg-[#121214]"
  >
    <aside
      id="sidebar"
      class="w-68 h-full bg-[#16161a] border-r border-[#1f1f24] flex flex-col justify-between shrink-0 transition-all duration-300 md:translate-x-0 -translate-x-full fixed md:static z-40"
    >
      <div class="p-4.5 space-y-6 flex flex-col h-full overflow-hidden">
        <button
          onclick="novoChat()"
          class="w-full flex items-center justify-between border border-[#232329] hover:bg-[#1e1e24] rounded-xl px-4 py-3 text-xs text-zinc-200 transition-all font-medium group"
        >
          <span class="flex items-center gap-2.5">
            <i
              data-lucide="plus"
              class="w-4 h-4 text-zinc-400 group-hover:text-white transition-colors"
            ></i>
            Nova conversa
          </span>
          <kbd
            class="text-[10px] text-zinc-500 font-mono border border-[#232329] px-1.5 py-0.5 rounded bg-[#121214]"
            >Ctrl + N</kbd
          >
        </button>

        <div
          class="p-4 bg-[#121214] border border-[#1f1f24] rounded-xl font-mono text-[11px] text-zinc-400 space-y-2 mx-1"
        >
          <div
            class="flex justify-between items-center text-[10px] uppercase font-bold text-zinc-500 tracking-wider mb-1.5"
          >
            <span>Hardware Status</span>
            <span
              class="w-1.5 h-1.5 bg-emerald-500 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.5)]"
            ></span>
          </div>
          <div class="flex justify-between">
            <span>CPU:</span><span id="hw-cpu" class="text-zinc-200">0%</span>
          </div>
          <div class="flex justify-between">
            <span>RAM:</span><span id="hw-ram" class="text-zinc-200">0%</span>
          </div>
        </div>

        <div class="flex-1 overflow-y-auto space-y-2 pr-1">
          <p
            class="text-[10px] font-semibold text-zinc-500 px-2 uppercase tracking-wider mb-2.5"
          >
            Recentes
          </p>
          <div id="history-list" class="space-y-1"></div>
        </div>
      </div>

      <div
        class="p-4.5 border-t border-[#1f1f24] text-[11px] text-zinc-500 font-mono flex justify-between items-center bg-[#16161a]"
      >
        <span>Histórico Salvo</span>
        <button
          onclick="limparTodoHistorico()"
          class="hover:text-red-400 transition-colors p-1 rounded-md hover:bg-[#1e1e24]"
          title="Limpar tudo"
        >
          <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
        </button>
      </div>
    </aside>

    <div class="flex-1 flex flex-col h-full overflow-hidden bg-[#121214]">
      <header
        class="border-b border-[#1f1f24] bg-[#121214]/80 backdrop-blur-md px-8 py-4 flex items-center justify-between sticky top-0 z-30"
      >
        <div class="flex items-center gap-4">
          <button
            onclick="toggleSidebar()"
            class="md:hidden p-2 hover:bg-[#16161a] rounded-xl text-zinc-400 transition-colors"
          >
            <i data-lucide="menu" class="w-4 h-4"></i>
          </button>
          <span class="text-sm font-medium tracking-tight text-white"
            >Koda</span
          >
          <span
            class="text-[10px] bg-[#16161a] text-zinc-400 px-2 py-0.5 rounded-md font-mono border border-[#232329]"
            >v2.0</span
          >
        </div>
        <div
          class="flex items-center gap-4 text-[11px] font-mono text-zinc-500"
        >
          <span class="flex items-center gap-2"
            ><i data-lucide="cpu" class="w-3.5 h-3.5 text-zinc-400"></i>
            llama-3.3</span
          >
          <span class="text-zinc-800">|</span>
          <span class="flex items-center gap-2 text-zinc-300"
            ><span
              class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_6px_rgba(16,185,129,0.4)]"
            ></span>
            local-agent</span
          >
        </div>
      </header>

      <main
        id="chat-container"
        class="flex-1 overflow-y-auto px-6 py-10 space-y-10 max-w-3xl w-full mx-auto flex flex-col"
      ></main>

      <footer class="p-6 bg-[#121214] border-t border-[#1f1f24] relative">
        <div class="max-w-3xl w-full mx-auto relative">
          <div
            class="absolute -top-8 right-2 flex items-center gap-2 text-[10px] font-mono text-zinc-500"
          >
            <span
              class="w-1.5 h-1.5 rounded-full bg-emerald-500/60 animate-pulse"
            ></span>
            <span
              >Uso da Sessão:
              <strong id="token-counter" class="text-zinc-400 font-medium"
                >0</strong
              >
              tokens</span
            >
          </div>

          <div
            class="relative flex flex-col bg-[#16161a] border border-[#232329] rounded-2xl focus-within:border-zinc-700 focus-within:ring-1 focus-within:ring-zinc-700 transition-all p-2.5 pl-5"
          >
            <div class="flex items-center w-full">
              <textarea
                id="user-input"
                placeholder="Manda a boa ou envia um comando..."
                rows="1"
                class="w-full bg-transparent text-[14px] text-white placeholder-zinc-500 pr-3 py-3 focus:outline-none resize-none overflow-hidden h-[46px] leading-relaxed"
                onkeypress="checkEnter(event)"
                oninput="autoGrow(this)"
              ></textarea>

              <input
                type="file"
                id="image-input"
                accept="image/*"
                class="hidden"
                onchange="atualizarIndicadorFoto()"
              />

              <button
                id="clip-btn"
                onclick="document.getElementById('image-input').click()"
                class="p-3 text-zinc-400 hover:text-emerald-400 transition-colors mr-1 rounded-xl hover:bg-[#1e1e24]"
                title="Anexar imagem para OCR"
              >
                <i
                  data-lucide="paperclip"
                  id="clip-icon"
                  class="w-4.5 h-4.5"
                ></i>
              </button>

              <button
                id="mic-btn"
                onclick="alternarGravacao()"
                class="p-3 text-zinc-400 hover:text-red-400 transition-colors mr-1 rounded-xl hover:bg-[#1e1e24]"
                title="Gravar comando de voz"
              >
                <i data-lucide="mic" id="mic-icon" class="w-4.5 h-4.5"></i>
              </button>
            </div>

            <div
              class="flex items-center justify-between pt-2.5 pr-1 border-t border-[#1f1f24] mt-1.5"
            >
              <span class="text-[10px] text-zinc-500 font-mono tracking-wide"
                >Pressione Enter para enviar • Shift + Enter para pular
                linha</span
              >
              <button
                onclick="enviarMensagem()"
                class="p-2.5 bg-zinc-100 hover:bg-white text-zinc-950 rounded-xl transition-all flex items-center justify-center disabled:opacity-30 shadow-sm"
                id="send-btn"
              >
                <i data-lucide="arrow-up" class="w-4 h-4 stroke-[2.5]"></i>
              </button>
            </div>
          </div>
        </div>
      </footer>
    </div>

    <script>
      marked.setOptions({ breaks: true, gfm: true });

      const chatContainer = document.getElementById("chat-container");
      const userInput = document.getElementById("user-input");
      const historyList = document.getElementById("history-list");
      const sidebar = document.getElementById("sidebar");

      let conversas = JSON.parse(localStorage.getItem("koda_chats")) || {};
      let chatIdAtual = localStorage.getItem("koda_current_chat_id") || null;
      let textoMensagemFixada = null;
      let responderComVozModoAtivo = false;
      let cronometroFoco = null;

      let mediaRecorder;
      let audioChunks = [];
      let gravando = false;
      let gravacaoTimeout;
      let wakeWordTimeout;
      let wakeWordRecognizer;
      let wakeWordAtiva = true;

      const TEMPO_SILENCIO_GRAVACAO = 5000;
      const TEMPO_INATIVIDADE_WAKE = 180000;

      function init() {
        const linkFavicon = document.getElementById("dynamic-favicon");
        if (linkFavicon) {
          linkFavicon.href =
            "/static/logo.png?v=" + Math.floor(Math.random() * 10000);
        }
        lucide.createIcons();
        renderizarListaHistorico();
        if (chatIdAtual && conversas[chatIdAtual]) {
          carregarConversa(chatIdAtual);
        } else {
          novoChat();
        }
        resetarTimerInatividadeKoda();
        setInterval(atualizarHardware, 3000);
      }

      async function atualizarHardware() {
        try {
          const response = await fetch("/telemetria");
          const dados = await response.json();
          if (!dados.erro) {
            document.getElementById("hw-cpu").innerText = dados.cpu + "%";
            document.getElementById("hw-ram").innerText = dados.ram + "%";
          }
        } catch (e) {
          console.log("Erro ao ler telemetria");
        }
      }

      function resetarTimerInatividadeKoda() {
        clearTimeout(wakeWordTimeout);
        if (wakeWordAtiva) {
          wakeWordTimeout = setTimeout(() => {
            console.log(
              "💤 [Koda OS] Modo de escuta suspenso por inatividade.",
            );
            desativarEscutaCompleta();
          }, TEMPO_INATIVIDADE_WAKE);
        }
      }

      function desativarEscutaCompleta() {
        wakeWordAtiva = false;
        if (wakeWordRecognizer) {
          try {
            wakeWordRecognizer.stop();
          } catch (e) {
            console.log("Reconhecedor já parado.");
          }
        }
        const micBtn = document.getElementById("mic-btn");
        if (micBtn) micBtn.title = "Escuta suspensa. Clique para reativar.";
      }

      function autoGrow(element) {
        element.style.height = "auto";
        element.style.height =
          element.value === "" ? "46px" : element.scrollHeight + "px";
      }

      function toggleSidebar() {
        sidebar.classList.toggle("-translate-x-full");
      }

      function formatarRespostaKoda(text) {
        const textoLimpo = text.trim();
        if (textoLimpo.startsWith("{") && textoLimpo.endsWith("}")) {
          return `<div class="opacity-40 flex items-center gap-2 font-mono text-xs text-zinc-500"><i data-lucide="loader-2" class="w-3.5 h-3.5 animate-spin"></i> Executando chamada interna da ferramenta...</div>`;
        }
        try {
          return marked.parse(text);
        } catch (e) {
          return escapeHtml(text);
        }
      }

      function alternarPin(texto, elementoBotao) {
        if (textoMensagemFixada === texto) {
          textoMensagemFixada = null;
          document
            .querySelectorAll(".pin-btn")
            .forEach((b) => b.classList.remove("text-emerald-400"));
          removerAlertaFixadoVisual();
        } else {
          textoMensagemFixada = texto;
          document
            .querySelectorAll(".pin-btn")
            .forEach((b) => b.classList.remove("text-emerald-400"));
          elementoBotao.classList.add("text-emerald-400");
          mostrarAlertaFixadoVisual();
        }
      }

      function mostrarAlertaFixadoVisual() {
        removerAlertaFixadoVisual();
        const alerta = document.createElement("div");
        alerta.id = "alerta-fixado";
        alerta.className =
          "fixed bottom-32 left-1/2 -translate-x-1/2 bg-[#16161a] border border-emerald-950/50 px-5 py-2.5 rounded-xl text-xs text-emerald-400 flex items-center gap-2 shadow-2xl font-mono z-50 animate-bounce";
        alerta.innerHTML = `<i data-lucide="pin" class="w-3.5 h-3.5 fill-emerald-400"></i> Contexto fixado para o próximo prompt`;
        document.body.appendChild(alerta);
        lucide.createIcons();
      }

      function removerAlertaFixadoVisual() {
        const existente = document.getElementById("alerta-fixado");
        if (existente) existente.remove();
      }

      function appendMessage(text, type, salvar = true) {
        const msgDiv = document.createElement("div");
        msgDiv.className =
          "flex items-start gap-5 group animate-fade-in relative w-full pb-2";

        const textoEscapadoProBotao = text
          .replace(/'/g, "\\'")
          .replace(/"/g, "&quot;");

        const botaoPin =
          type === "user" || (type === "koda" && !text.trim().startsWith("{"))
            ? `<button onclick="alternarPin('${textoEscapadoProBotao}', this)" class="pin-btn opacity-0 group-hover:opacity-100 absolute right-0 top-0 text-zinc-500 hover:text-emerald-400 transition-all p-1.5 rounded-lg hover:bg-[#16161a]" title="Fixar mensagem como contexto">
                <i data-lucide="pin" class="w-3.5 h-3.5"></i>
               </button>`
            : "";

        if (type === "user") {
          msgDiv.innerHTML = `
                    <div class="w-8 h-8 rounded-xl bg-[#232329] flex items-center justify-center text-zinc-200 shrink-0 mt-0.5 font-mono text-xs font-bold border border-[#2d2d35]">U</div>
                    <div class="space-y-1.5 flex-1 pr-8 overflow-hidden">
                        <p class="text-xs font-semibold text-zinc-400 tracking-wide">Você</p>
                        <div class="text-[14px] text-zinc-200 leading-relaxed break-words">${escapeHtml(text)}</div>
                    </div>
                    ${botaoPin}`;
        } else if (type === "koda") {
          const conteudoHtml = formatarRespostaKoda(text);
          msgDiv.innerHTML = `
                    <div class="w-8 h-8 rounded-xl bg-[#16161a] border border-[#232329] flex items-center justify-center text-zinc-200 shrink-0 mt-0.5 shadow-sm"><i data-lucide="sparkles" class="w-3.5 h-3.5 text-zinc-300"></i></div>
                    <div class="space-y-2 flex-1 pr-8 overflow-hidden">
                        <p class="text-xs font-semibold text-zinc-400 tracking-wide">Koda</p>
                        <div class="text-[14px] text-zinc-300 leading-relaxed markdown-content break-words">${conteudoHtml}</div>
                    </div>
                    ${botaoPin}`;

          if (
            salvar &&
            !text.trim().startsWith("{") &&
            responderComVozModoAtivo
          ) {
            falarTexto(text);
            responderComVozModoAtivo = false;
          }
        } else if (type === "tool") {
          msgDiv.innerHTML = `
                    <div class="w-8 h-8 rounded-xl bg-[#1e1b18] border border-[#3c322c] flex items-center justify-center text-[#fbd38d] shrink-0 mt-0.5"><i data-lucide="terminal" class="w-3.5 h-3.5"></i></div>
                    <div class="space-y-2 flex-1 font-mono text-xs overflow-hidden">
                        <p class="text-[#dd6b20] font-bold text-[10px] tracking-wider uppercase">[System Tool Log]</p>
                        <pre class="p-4 bg-[#141210] border border-[#25201c] text-[#fbd38d]/90 rounded-xl overflow-x-auto whitespace-pre-wrap leading-relaxed">${escapeHtml(text)}</pre>
                    </div>`;
        }

        chatContainer.appendChild(msgDiv);
        lucide.createIcons();
        chatContainer.scrollTop = chatContainer.scrollHeight;

        if (salvar && chatIdAtual) {
          conversas[chatIdAtual].mensagens.push({ text, type });
          if (
            type === "user" &&
            conversas[chatIdAtual].titulo === "Nova conversa"
          ) {
            conversas[chatIdAtual].titulo =
              text.length > 28 ? text.substring(0, 25) + "..." : text;
            renderizarListaHistorico();
          }
          localStorage.setItem("koda_chats", JSON.stringify(conversas));
        }
      }

      function novoChat() {
        chatIdAtual = "chat_" + Date.now();
        conversas[chatIdAtual] = { titulo: "Nova conversa", mensagens: [] };
        localStorage.setItem("koda_current_chat_id", chatIdAtual);
        localStorage.setItem("koda_chats", JSON.stringify(conversas));

        textoMensagemFixada = null;
        removerAlertaFixadoVisual();
        chatContainer.innerHTML = "";
        renderizarListaHistorico();
        appendMessage(
          "Sistemas conectados. Qual é a boa de hoje?",
          "koda",
          true,
        );
      }

      function carregarConversa(id) {
        if (!conversas[id]) return;
        chatIdAtual = id;
        localStorage.setItem("koda_current_chat_id", id);
        chatContainer.innerHTML = "";
        textoMensagemFixada = null;
        removerAlertaFixadoVisual();

        conversas[id].mensagens.forEach((msg) => {
          appendMessage(msg.text, msg.type, false);
        });
        renderizarListaHistorico();
        if (
          window.innerWidth < 768 &&
          !sidebar.classList.contains("-translate-x-full")
        ) {
          toggleSidebar();
        }
      }

      function deletarConversa(id, event) {
        event.stopPropagation();
        delete conversas[id];
        localStorage.setItem("koda_chats", JSON.stringify(conversas));
        if (chatIdAtual === id) {
          chatIdAtual = null;
          localStorage.removeItem("koda_current_chat_id");
          novoChat();
        } else {
          renderizarListaHistorico();
        }
      }

      function limparTodoHistorico() {
        if (
          confirm(
            "Deseja apagar permanentemente todo seu histórico de conversas?",
          )
        ) {
          conversas = {};
          localStorage.clear();
          novoChat();
        }
      }

      function renderizarListaHistorico() {
        historyList.innerHTML = "";
        const idsOrdenados = Object.keys(conversas).sort(
          (a, b) => b.split("_")[1] - a.split("_")[1],
        );

        idsOrdenados.forEach((id) => {
          const ativo = id === chatIdAtual;
          const itemDiv = document.createElement("div");
          itemDiv.className = `group/item w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-xs font-medium transition-all cursor-pointer ${ativo ? "bg-[#121214] border border-[#1f1f24] text-white shadow-sm" : "text-zinc-400 border border-transparent hover:bg-[#121214]/50 hover:text-zinc-200"}`;
          itemDiv.setAttribute("onclick", `carregarConversa('${id}')`);

          itemDiv.innerHTML = `
                    <span class="truncate flex items-center gap-2.5 max-w-[80%]">
                        <i data-lucide="message-square" class="w-3.5 h-3.5 shrink-0 opacity-60"></i>
                        ${escapeHtml(conversas[id].titulo)}
                    </span>
                    <button onclick="deletarConversa('${id}', event)" class="opacity-0 group-hover/item:opacity-100 hover:text-red-400 transition-all p-1 rounded-md hover:bg-[#1e1e24]">
                        <i data-lucide="x" class="w-3.5 h-3.5"></i>
                    </button>
                `;
          historyList.appendChild(itemDiv);
        });
        lucide.createIcons();
      }

      function checkEnter(event) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          enviarMensagem();
        }
      }

      document.addEventListener("keydown", (e) => {
        if (e.ctrlKey && e.key.toLowerCase() === "n") {
          e.preventDefault();
          novoChat();
        }
      });

      function escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      async function alternarGravacao() {
        const micBtn = document.getElementById("mic-btn");
        const micIcon = document.getElementById("mic-icon");

        if (!wakeWordAtiva) {
          wakeWordAtiva = true;
          console.log(
            "⚡ [Koda OS] Escuta reativada manualmente pelo usuário.",
          );
        }
        resetarTimerInatividadeKoda();

        if (!gravando) {
          try {
            if (wakeWordRecognizer) {
              try {
                wakeWordRecognizer.stop();
              } catch (e) {}
            }

            const stream = await navigator.mediaDevices.getUserMedia({
              audio: true,
            });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = (event) => {
              if (event.data.size > 0) audioChunks.push(event.data);
            };

            mediaRecorder.onstop = async () => {
              clearTimeout(gravacaoTimeout);

              if (audioChunks.length === 0) {
                restaurarBotaoMicPadrao();
                if (wakeWordAtiva) iniciarEscutaWakeWord();
                return;
              }

              const audioBlob = new Blob(audioChunks, { type: "audio/webm" });

              micBtn.className =
                "p-3 text-amber-400 animate-spin mr-1 rounded-xl bg-amber-950/10";
              micIcon.setAttribute("data-lucide", "loader-2");
              lucide.createIcons();

              const formData = new FormData();
              formData.append("audio", audioBlob, "comando.webm");

              try {
                const response = await fetch("/transcrever", {
                  method: "POST",
                  body: formData,
                });
                const resultado = await response.json();

                if (resultado.texto && resultado.texto.trim() !== "") {
                  responderComVozModoAtivo = true;
                  userInput.value = resultado.texto;
                  autoGrow(userInput);
                  enviarMensagem();
                }
              } catch (erro) {
                console.error("Erro ao transcrever áudio:", erro);
              }

              restaurarBotaoMicPadrao();
              if (wakeWordAtiva) iniciarEscutaWakeWord();
            };

            mediaRecorder.start();
            gravando = true;
            micBtn.className =
              "p-3 text-red-400 animate-pulse mr-1 rounded-xl bg-red-950/30 border border-red-900/40";

            gravacaoTimeout = setTimeout(() => {
              if (gravando) {
                console.log("⏱️ Silêncio longo detectado. Abortando captura.");
                audioChunks = [];
                try {
                  mediaRecorder.stream
                    .getTracks()
                    .forEach((track) => track.stop());
                  mediaRecorder.stop();
                } catch (e) {}
                gravando = false;
              }
            }, TEMPO_SILENCIO_GRAVACAO);
          } catch (err) {
            alert("Não foi possível acessar o microfone.");
            console.error(err);
            if (wakeWordAtiva) iniciarEscutaWakeWord();
          }
        } else {
          try {
            mediaRecorder.stream.getTracks().forEach((track) => track.stop());
            mediaRecorder.stop();
          } catch (e) {}
          gravando = false;
        }
      }

      function restaurarBotaoMicPadrao() {
        const micBtn = document.getElementById("mic-btn");
        const micIcon = document.getElementById("mic-icon");
        if (micBtn && micIcon) {
          micBtn.className =
            "p-3 text-zinc-400 hover:text-red-400 transition-colors mr-1 rounded-xl hover:bg-[#1e1e24]";
          micIcon.setAttribute("data-lucide", "mic");
          lucide.createIcons();
        }
      }

      function atualizarIndicadorFoto() {
        const input = document.getElementById("image-input");
        const clipBtn = document.getElementById("clip-btn");
        if (input.files && input.files[0]) {
          // Muda a cor do ícone para indicar que há um arquivo anexado
          clipBtn.classList.remove("text-zinc-400");
          clipBtn.classList.add(
            "text-emerald-400",
            "bg-emerald-950/20",
            "border",
            "border-emerald-900/30",
          );
          clipBtn.title = `Imagem anexada: ${input.files[0].name} (Clique para trocar)`;
        } else {
          clipBtn.className =
            "p-3 text-zinc-400 hover:text-emerald-400 transition-colors mr-1 rounded-xl hover:bg-[#1e1e24]";
          clipBtn.title = "Anexar imagem para OCR";
        }
      }

      async function enviarMensagem() {
        const texto = userInput.value.trim();
        const imageInput = document.getElementById("image-input");
        const temImagem = imageInput.files && imageInput.files[0];

        // Só cancela se não houver texto E não houver imagem
        if (!texto && !temImagem) return;

        resetarTimerInatividadeKoda();

        if (document.activeElement === userInput || !responderComVozModoAtivo) {
          if (document.activeElement === userInput) {
            responderComVozModoAtivo = false;
          }
        }

        // Se houver uma foto, mostra uma mensagem simulada no chat do usuário
        if (temImagem) {
          appendMessage(
            `[Enviando imagem: ${imageInput.files[0].name}] ${texto}`,
            "user",
          );
        } else {
          appendMessage(texto, "user");
        }

        userInput.value = "";
        userInput.style.height = "46px";

        // Prepara o FormData em vez do JSON bruto
        const formData = new FormData();
        formData.append("mensagem", texto);
        formData.append("session_id", chatIdAtual || "web_default_session");

        if (temImagem) {
          formData.append("imagem", imageInput.files[0]);
        }

        // Reseta o input de imagem e o visual do botão após o envio
        imageInput.value = "";
        atualizarIndicadorFoto();

        try {
          const response = await fetch("/chat", {
            method: "POST",
            body: formData, // O navegador define o Content-Type correto para FormData automaticamente
          });

          const dados = await response.json();

          if (dados.tokens_usados) {
            const elementoContador = document.getElementById("token-counter");
            let totalAtual = parseInt(elementoContador.innerText) || 0;
            elementoContador.innerText = totalAtual + dados.tokens_usados;
          }

          if (dados.fluxo && Array.isArray(dados.fluxo)) {
            dados.fluxo.forEach((item) => {
              if (item.type === "jarvis" || item.type === "koda") {
                appendMessage(item.content, "koda");
              } else if (item.type === "tool") {
                appendMessage(item.content, "tool");
              }
            });
          }
        } catch (erro) {
          appendMessage("Erro de conexão com o terminal local.", "koda");
        }
      }

      function falarTexto(texto) {
        window.speechSynthesis.cancel();
        if (texto.trim().startsWith("{")) return;

        let textoLimpo = texto
          .replace(/\*+/g, "")
          .replace(/`+/g, "")
          .replace(/#+/g, "")
          .replace(/-\s+/g, "");
        const falar = new SpeechSynthesisUtterance(textoLimpo);
        falar.lang = "pt-BR";
        falar.rate = 1.05;
        falar.pitch = 0.85;

        const vozes = window.speechSynthesis.getVoices();
        let vozKoda =
          vozes.find(
            (v) => v.lang.includes("pt-BR") && v.name.includes("Daniel"),
          ) ||
          vozes.find(
            (v) =>
              v.lang.includes("pt-BR") && v.name.toLowerCase().includes("male"),
          ) ||
          vozes.find(
            (v) => v.lang.includes("pt-BR") && v.name.includes("Google"),
          ) ||
          vozes.find((v) => v.lang.includes("pt-BR"));

        if (vozKoda) falar.voice = vozKoda;
        window.speechSynthesis.speak(falar);
      }

      window.speechSynthesis.onvoiceschanged = () =>
        window.speechSynthesis.getVoices();

      function ativarModoFoco(minutos) {
        let segundosRestantes = minutos * 60;
        document.getElementById("sidebar").classList.add("hidden");
        document.querySelector("header").classList.add("opacity-10");
        chatContainer.innerHTML = `<div class="flex flex-col items-center justify-center flex-1 space-y-5 my-auto animate-fade-in">
        <div class="text-7xl font-mono font-bold tracking-widest text-white animate-pulse" id="pomodoro-timer">00:00</div>
        <p class="text-xs text-zinc-500 font-mono tracking-wider uppercase">Modo de Foco Ativo • Concentre-se nos códigos</p>
        <button onclick="desativarModoFoco()" class="px-5 py-2 border border-[#232329] hover:bg-red-950/20 rounded-xl text-xs text-red-400 transition-colors font-mono">Abortar Foco</button>
    </div>`;

        cronometroFoco = setInterval(() => {
          let min = Math.floor(segundosRestantes / 60);
          let seg = segundosRestantes % 60;
          const timerEl = document.getElementById("pomodoro-timer");
          if (timerEl) {
            timerEl.innerText = `${min.toString().padStart(2, "0")}:${seg.toString().padStart(2, "0")}`;
          }

          if (segundosRestantes <= 0) {
            clearInterval(cronometroFoco);
            desativarModoFoco();
            falarTexto(
              "Modo de foco concluído. Excelente trabalho. Faça uma pausa.",
            );
          }
          segundosRestantes--;
        }, 1000);
      }

      function desativarModoFoco() {
        if (cronometroFoco) clearInterval(cronometroFoco);
        document.getElementById("sidebar").classList.remove("hidden");
        document.querySelector("header").classList.remove("opacity-10");
        novoChat();
      }

      function iniciarEscutaWakeWord() {
        if (!("webkitSpeechRecognition" in window)) {
          console.log("Wake Word não suportada neste navegador.");
          return;
        }

        if (!wakeWordAtiva || gravando) return;

        wakeWordRecognizer = new webkitSpeechRecognition();
        wakeWordRecognizer.continuous = true;
        wakeWordRecognizer.interimResults = false;
        wakeWordRecognizer.lang = "pt-BR";

        wakeWordRecognizer.onresult = (event) => {
          for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
              let textoOuvido = event.results[i][0].transcript
                .trim()
                .toLowerCase();
              console.log("🎙 Honorável Koda [Escuta Ativa]:", textoOuvido);

              if (textoOuvido.includes("koda") && !gravando) {
                console.log(
                  "⚡ Palavra-chave detectada! Iniciando gravação...",
                );
                wakeWordRecognizer.stop();
                alternarGravacao();
              }
            }
          }
        };

        wakeWordRecognizer.onend = () => {
          if (wakeWordAtiva && !gravando) {
            try {
              wakeWordRecognizer.start();
            } catch (e) {}
          }
        };

        try {
          wakeWordRecognizer.start();
        } catch (e) {}
      }

      window.onload = () => {
        init();
        iniciarEscutaWakeWord();
      };
    </script>
  </body>
