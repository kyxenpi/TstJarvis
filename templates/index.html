<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Koda</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #e8e8ea;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      height: 100vh; overflow: hidden; display: flex; flex-direction: column;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
    .hidden { display: none !important; }
    ::selection { background: rgba(99,102,241,0.3); }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; background: #000; flex-shrink: 0; z-index: 10;
    }
    .h-left { display: flex; align-items: center; gap: 12px; }
    .h-logo { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; color: #fff; }
    .h-model { font-size: 11px; color: #555; padding: 3px 10px; border: 1px solid #222; border-radius: 12px; white-space: nowrap; }
    .h-right { display: flex; align-items: center; gap: 8px; }
    .h-btn {
      background: none; border: 1px solid #222; color: #888;
      padding: 6px 14px; border-radius: 20px; cursor: pointer;
      font-size: 12px; transition: all 0.15s;
      display: flex; align-items: center; gap: 5px;
    }
    .h-btn:hover { border-color: #444; color: #ccc; }
    .h-btn svg { width: 14px; height: 14px; }

    #chat-container {
      flex: 1; overflow-y: auto;
      padding: 20px 16px 8px;
      max-width: 720px; width: 100%;
      margin: 0 auto;
    }
    #chat-container:empty::after { content: ''; flex: 1; }

    .msg-row { display: flex; gap: 10px; margin-bottom: 20px; animation: fadeIn 0.2s ease; }
    .msg-row.user { flex-direction: row-reverse; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 11px; font-weight: 600;
    }
    .msg-row.user .msg-avatar { background: #222; color: #888; }
    .msg-row.koda .msg-avatar { background: #111; color: #666; }
    .msg-row.koda .msg-avatar svg { width: 15px; height: 15px; }

    .msg-content { max-width: 85%; display: flex; flex-direction: column; }
    .msg-bubble { padding: 10px 16px; font-size: 14px; line-height: 1.6; }
    .msg-row.user .msg-bubble { background: #1a1a2e; border-radius: 16px 16px 4px 16px; color: #e8e8ea; }
    .msg-row.koda .msg-bubble { background: #111; border-radius: 16px 16px 16px 4px; color: #d0d0d4; }

    .markdown-body p { margin-bottom: 6px; }
    .markdown-body p:last-child { margin-bottom: 0; }
    .markdown-body strong { color: #fff; font-weight: 600; }
    .markdown-body code { background: #1a1a2e; padding: 2px 6px; border-radius: 6px; font-size: 12.5px; font-family: 'SF Mono', 'JetBrains Mono', monospace; color: #a78bfa; }
    .markdown-body pre { background: #0a0a0f; border: 1px solid #1a1a2e; padding: 12px; border-radius: 12px; margin: 8px 0; overflow-x: auto; }
    .markdown-body pre code { background: none; padding: 0; color: #bbb; }
    .markdown-body ul, .markdown-body ol { padding-left: 20px; margin-bottom: 6px; }
    .markdown-body a { color: #6366f1; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { color: #fff; margin: 10px 0 4px; }
    .markdown-body blockquote { border-left: 2px solid #333; padding-left: 12px; color: #888; margin: 8px 0; }

    footer { flex-shrink: 0; padding: 8px 16px 20px; }
    .input-wrap { max-width: 720px; margin: 0 auto; position: relative; }
    #image-preview-container {
      display: none; align-items: center; gap: 10px; padding: 8px 12px;
      margin-bottom: 8px; background: #111; border-radius: 12px; border: 1px solid #1a1a2e; animation: fadeIn 0.2s ease;
    }
    #image-preview-container.show { display: flex; }
    #image-preview { width: 34px; height: 34px; object-fit: cover; border-radius: 8px; border: 1px solid #222; }
    .preview-info { flex: 1; font-size: 11px; }
    .preview-info .name { color: #d0d0d4; }
    .preview-info .size { color: #555; font-size: 10px; }
    .preview-remove { background: none; border: none; color: #555; cursor: pointer; padding: 4px; border-radius: 50%; }
    .preview-remove:hover { color: #ef4444; }

    .input-area {
      display: flex; align-items: flex-end;
      background: #111; border: 1px solid #222; border-radius: 16px;
      padding: 4px 4px 4px 16px; transition: border-color 0.15s;
    }
    .input-area:focus-within { border-color: #444; }
    .input-area textarea {
      flex: 1; background: none; border: none; color: #e8e8ea;
      font-size: 14px; font-family: inherit; padding: 10px 4px;
      resize: none; outline: none; line-height: 1.4; max-height: 100px;
    }
    .input-area textarea::placeholder { color: #444; }
    .input-actions { display: flex; align-items: center; gap: 2px; padding-bottom: 2px; }
    .input-actions button {
      background: none; border: none; color: #555;
      width: 32px; height: 32px; border-radius: 50%;
      cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .input-actions button:hover { background: #1a1a2e; }
    .input-actions button svg { width: 17px; height: 17px; }
    .send-btn { background: #fff !important; color: #000 !important; border-radius: 50% !important; width: 32px !important; height: 32px !important; opacity: 0.25; }
    .send-btn.active { opacity: 1; }

    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; display: none; }
    .sidebar-overlay.open { display: block; }
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 280px;
      background: #0a0a0f; border-right: 1px solid #1a1a2e; z-index: 50;
      transform: translateX(-100%); transition: transform 0.25s ease;
      display: flex; flex-direction: column;
    }
    #sidebar.open { transform: translateX(0); }
    .sh { padding: 18px 16px 10px; display: flex; justify-content: space-between; align-items: center; }
    .sh span { font-size: 16px; font-weight: 600; color: #fff; }
    .sh-close { background: none; border: none; color: #555; cursor: pointer; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .sh-close:hover { background: #111; }
    #history-list { flex: 1; overflow-y: auto; padding: 4px 12px; }
    .hist-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 10px; cursor: pointer; font-size: 13px; color: #888; transition: all 0.1s; margin-bottom: 2px; }
    .hist-item:hover { background: #111; }
    .hist-item.active { background: #1a1a2e; color: #d0d0d4; }
    .hist-item .del-btn { opacity: 0; background: none; border: none; color: #555; cursor: pointer; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .hist-item:hover .del-btn { opacity: 1; }
    .hist-item .del-btn:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
    .sf { padding: 14px 16px; border-top: 1px solid #1a1a2e; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #444; }
    .sf button { background: none; border: none; color: #555; cursor: pointer; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .sf button:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
    .sf button svg { width: 13px; height: 13px; }

    @media (max-width: 600px) { header { padding: 10px 14px; } #chat-container { padding: 14px 10px 4px; } footer { padding: 6px 10px 16px; } .msg-content { max-width: 90%; } }

    /* ============ TOASTS ============ */
    #toast-container {
      position: fixed;
      bottom: 80px;
      right: 16px;
      z-index: 100;
      display: flex;
      flex-direction: column-reverse;
      gap: 6px;
      pointer-events: none;
    }
    .toast {
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 12px;
      background: #13131a;
      border: 1px solid #1e1e2e;
      color: #bbb;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      animation: toastIn 0.25s ease;
      max-width: 280px;
      display: flex;
      align-items: center;
      gap: 8px;
      line-height: 1.4;
      pointer-events: auto;
      backdrop-filter: blur(10px);
    }
    .toast-icon { width: 16px; height: 16px; flex-shrink: 0; }
    .toast-icon.loading { animation: spin 1s linear infinite; }
    .toast-icon.success { color: #34d399; }
    .toast-icon.error { color: #ef4444; }
    .toast-icon.info { color: #6366f1; }
    .toast-text { flex: 1; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .toast.removing { animation: toastOut 0.2s ease forwards; }
    @keyframes toastOut { to { opacity: 0; transform: translateY(4px) scale(0.95); } }

    /* ============ NEURAL NETWORK CANVAS ============ */
    #nn-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
    }
    #nn-overlay.open { display: flex; align-items: center; justify-content: center; flex-direction: column; }
    #nn-canvas {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
    }
    .nn-label {
      position: relative;
      z-index: 1;
      color: #888;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: pulseLabel 2s ease-in-out infinite;
    }
    @keyframes pulseLabel { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    .nn-close-btn {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      background: #1a1a2e;
      border: 1px solid #333;
      color: #888;
      padding: 8px 24px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .nn-close-btn:hover { border-color: #555; color: #ccc; }
  </style>
</head>
<body>

  <div class="sidebar-overlay" id="sidebar-overlay" onclick="fecharSidebar()"></div>
  <aside id="sidebar">
    <div class="sh">
      <span>Historico</span>
      <button class="sh-close" onclick="fecharSidebar()"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <div id="history-list"></div>
    <div class="sf">
      <span id="token-counter">0 tokens</span>
      <button onclick="limparTodoHistorico()" title="Limpar tudo"><i data-lucide="trash-2"></i></button>
    </div>
  </aside>

  <header>
    <div class="h-left">
      <button class="h-btn" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
      <span class="h-logo">Koda</span>
      <span class="h-model">Groq · 70B</span>
    </div>
    <div class="h-right">
      <button class="h-btn" onclick="novoChat()"><i data-lucide="square-pen"></i>Novo chat</button>
    </div>
  </header>

  <div id="chat-container"></div>

  <!-- Neural Network Overlay -->
  <div id="nn-overlay">
    <canvas id="nn-canvas"></canvas>
    <div class="nn-label">Gravando...</div>
    <button class="nn-close-btn" onclick="pararGravacao()">Parar</button>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <div id="image-preview-container">
    <img id="image-preview" src="" alt="preview" />
    <div class="preview-info">
      <div class="name" id="preview-filename">arquivo.png</div>
      <div class="size" id="preview-filesize">0 KB</div>
    </div>
    <button class="preview-remove" onclick="removerImagemAnexa()"><i data-lucide="x"></i></button>
  </div>

  <footer>
    <div class="input-wrap">
      <div class="input-area">
        <textarea id="user-input" placeholder="Digite sua mensagem..." rows="1" onkeypress="checkEnter(event)" oninput="autoGrow(this)"></textarea>
        <input type="file" id="image-input" accept="image/*" class="hidden" onchange="atualizarIndicadorFoto()" />
        <div class="input-actions">
          <button onclick="document.getElementById('image-input').click()" title="Anexar imagem"><i data-lucide="paperclip"></i></button>
          <button onclick="toggleGravacao()" title="Comando de voz" id="mic-btn"><i data-lucide="mic" id="mic-icon"></i></button>
          <button class="send-btn" id="send-btn" onclick="enviarMensagem()"><i data-lucide="arrow-up"></i></button>
        </div>
      </div>
    </div>
  </footer>

  <script>
    marked.setOptions({ breaks: true, gfm: true });
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const historyList = document.getElementById('history-list');
    const sendBtn = document.getElementById('send-btn');
    const toastContainer = document.getElementById('toast-container');
    const nnOverlay = document.getElementById('nn-overlay');
    const nnCanvas = document.getElementById('nn-canvas');

    let conversas = JSON.parse(localStorage.getItem('koda_chats')) || {};
    let chatIdAtual = localStorage.getItem('koda_current_chat_id') || null;

    /* ========= NEURAL NETWORK VIZ ========= */
    const nn = { ctx: null, nodes: [], connections: [], animId: null, time: 0, energy: 0, audioStream: null, audioCtx: null, analyser: null, dataArray: null };

    function initNN() {
      nnCanvas.width = nnCanvas.offsetWidth * devicePixelRatio;
      nnCanvas.height = nnCanvas.offsetHeight * devicePixelRatio;
      nn.ctx = nnCanvas.getContext('2d');
      nn.ctx.scale(devicePixelRatio, devicePixelRatio);
      const w = nnCanvas.offsetWidth, h = nnCanvas.offsetHeight;
      nn.nodes = [];
      nn.connections = [];
      const count = Math.min(70, Math.floor(w * h / 12000));
      for (let i = 0; i < count; i++) {
        nn.nodes.push({
          x: (Math.random() - 0.5) * 3, y: (Math.random() - 0.5) * 3, z: (Math.random() - 0.5) * 2,
          baseSize: 1.5 + Math.random() * 3, phase: Math.random() * Math.PI * 2,
          speed: 0.2 + Math.random() * 0.4
        });
      }
      for (let i = 0; i < nn.nodes.length; i++) {
        for (let j = i + 1; j < nn.nodes.length; j++) {
          const dx = nn.nodes[i].x - nn.nodes[j].x, dy = nn.nodes[i].y - nn.nodes[j].y, dz = nn.nodes[i].z - nn.nodes[j].z;
          const d = Math.sqrt(dx*dx + dy*dy + dz*dz);
          if (d < 1.5) nn.connections.push({ i, j, dist: d, baseAlpha: 0.15 + Math.random() * 0.2 });
        }
      }
    }

    function drawNN() {
      const w = nnCanvas.offsetWidth, h = nnCanvas.offsetHeight;
      const ctx = nn.ctx;
      ctx.clearRect(0, 0, w, h);
      nn.time += 0.008;
      const energy = nn.energy;

      const cx = w / 2, cy = h / 2;
      const scale = Math.min(w, h) * 0.3;

      const rotY = Math.sin(nn.time * 0.15) * 0.4;
      const rotX = Math.sin(nn.time * 0.1) * 0.2;

      const proj = [];
      for (const n of nn.nodes) {
        let x = n.x, y = n.y, z = n.z;
        const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
        const x1 = x * cosY - z * sinY;
        const z1 = x * sinY + z * cosY;
        x = x1; z = z1;
        const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
        const y1 = y * cosX - z * sinX;
        z = y * sinX + z * cosX;
        y = y1;
        const perspective = 3 / (3 + z);
        proj.push({
          sx: cx + x * scale * perspective,
          sy: cy + y * scale * perspective,
          size: n.baseSize * perspective,
          z: z,
          phase: n.phase,
          speed: n.speed
        });
      }

      const pulse = 0.5 + energy * 0.5;
      const glow = Math.min(1, energy * 2.5);

      for (const conn of nn.connections) {
        const p1 = proj[conn.i], p2 = proj[conn.j];
        const avgZ = (p1.z + p2.z) / 2;
        const alpha = conn.baseAlpha * (1 + glow * 1.5) * (1 - avgZ / 3);
        if (alpha < 0.01) continue;
        ctx.beginPath();
        ctx.moveTo(p1.sx, p1.sy);
        ctx.lineTo(p2.sx, p2.sy);
        ctx.strokeStyle = `rgba(130, 140, 255, ${alpha})`;
        ctx.lineWidth = 0.5 + glow * 1.5;
        ctx.stroke();
      }

      for (let i = 0; i < nn.nodes.length; i++) {
        const p = proj[i];
        const wave = Math.sin(nn.time * p.speed * 2 + p.phase) * 0.3 + 0.7;
        const size = p.size * (0.5 + wave * 0.5 * pulse);
        const alpha = 0.4 + glow * 0.6;
        const gradient = ctx.createRadialGradient(p.sx, p.sy, 0, p.sx, p.sy, size * 2.5);
        gradient.addColorStop(0, `rgba(160, 170, 255, ${alpha})`);
        gradient.addColorStop(0.4, `rgba(120, 130, 255, ${alpha * 0.6})`);
        gradient.addColorStop(1, `rgba(80, 90, 200, 0)`);
        ctx.beginPath();
        ctx.arc(p.sx, p.sy, size * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(p.sx, p.sy, size * 0.8, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200, 210, 255, ${0.5 + glow * 0.5})`;
        ctx.fill();
      }
    }

    function startNN() {
      nnOverlay.classList.add('open');
      nnOverlay.style.display = 'flex';
      initNN();
      nn.energy = 0;
      function loop() {
        drawNN();
        nn.animId = requestAnimationFrame(loop);
      }
      loop();
      nnCanvas.addEventListener('resize', initNN);
    }

    function stopNN() {
      nnOverlay.classList.remove('open');
      nnOverlay.style.display = 'none';
      if (nn.animId) { cancelAnimationFrame(nn.animId); nn.animId = null; }
    }

    /* ========= AUDIO + NN ========= */
    let gravacaoAtiva = false;
    let mediaRecorder = null;
    let audioChunks = [];
    let gravacaoTimeout = null;

    async function setupAudioAnalyser(stream) {
      try {
        nn.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = nn.audioCtx.createMediaStreamSource(stream);
        nn.analyser = nn.audioCtx.createAnalyser();
        nn.analyser.fftSize = 256;
        source.connect(nn.analyser);
        nn.dataArray = new Uint8Array(nn.analyser.frequencyBinCount);
        function readAudio() {
          if (!nn.analyser) return;
          nn.analyser.getByteFrequencyData(nn.dataArray);
          let sum = 0;
          for (let i = 0; i < nn.dataArray.length; i++) sum += nn.dataArray[i];
          nn.energy = sum / nn.dataArray.length / 255;
          if (gravacaoAtiva) requestAnimationFrame(readAudio);
        }
        readAudio();
      } catch(e) { console.log('Audio viz error:', e); }
    }

    async function toggleGravacao() {
      const micBtn = document.getElementById('mic-btn');
      if (gravacaoAtiva) {
        pararGravacao();
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        nn.audioStream = stream;

        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
          clearTimeout(gravacaoTimeout);
          stopNN();
          if (nn.audioCtx) { nn.audioCtx.close(); nn.audioCtx = null; }
          nn.analyser = null;
          if (audioChunks.length === 0) return;
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          const formData = new FormData();
          formData.append('audio', blob, 'voz.webm');
          try {
            showToast('Transcrevendo audio...', 'loading');
            const res = await fetch('/transcrever', { method: 'POST', body: formData });
            const data = await res.json();
            removeAllToasts();
            if (data.texto && data.texto.trim()) {
              userInput.value = data.texto;
              autoGrow(userInput);
              enviarMensagem();
            } else {
              showToast('Nada foi detectado', 'error');
            }
          } catch(e) {
            removeAllToasts();
            showToast('Erro na transcricao', 'error');
          }
        };
        mediaRecorder.start();
        gravacaoAtiva = true;
        micBtn.style.color = '#ef4444';
        startNN();
        setupAudioAnalyser(stream);

        gravacaoTimeout = setTimeout(() => {
          if (gravacaoAtiva) pararGravacao();
        }, 8000);
      } catch(e) {
        showToast('Microfone nao acessivel', 'error');
      }
    }

    function pararGravacao() {
      if (!gravacaoAtiva) return;
      gravacaoAtiva = false;
      clearTimeout(gravacaoTimeout);
      document.getElementById('mic-btn').style.color = '';
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      if (nn.audioStream) {
        nn.audioStream.getTracks().forEach(t => t.stop());
        nn.audioStream = null;
      }
    }

    /* ========= TOASTS ========= */
    function showToast(message, type = 'info', duration = 3000) {
      const icons = { info: 'circle-alert', loading: 'loader-2', success: 'check-circle-2', error: 'alert-circle', tool: 'zap' };
      const iconName = icons[type] || 'circle-alert';
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<i data-lucide="${iconName}" class="toast-icon ${type}"></i><span class="toast-text">${message}</span>`;
      toastContainer.appendChild(toast);
      lucide.createIcons();
      if (type !== 'loading') {
        setTimeout(() => {
          toast.classList.add('removing');
          setTimeout(() => { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 200);
        }, duration);
      }
      return toast;
    }

    function removeAllToasts() {
      toastContainer.innerHTML = '';
    }

    /* ========= CHAT ========= */
    function init() {
      lucide.createIcons();
      renderizarListaHistorico();
      if (chatIdAtual && conversas[chatIdAtual]) { carregarConversa(chatIdAtual); }
      else { novoChat(); }
      userInput.addEventListener('input', () => {
        sendBtn.style.opacity = userInput.value.trim() ? '1' : '0.25';
      });
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebar-overlay').classList.toggle('open');
    }
    function fecharSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.remove('open');
    }
    function autoGrow(el) {
      el.style.height = 'auto';
      el.style.height = (el.value === '' ? '44px' : Math.min(el.scrollHeight, 120)) + 'px';
    }
    function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function appendMessage(text, type, salvar = true) {
      const row = document.createElement('div');
      row.className = 'msg-row ' + type;
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      if (type === 'user') { avatar.textContent = 'U'; }
      else { avatar.innerHTML = '<i data-lucide="sparkles"></i>'; }

      const content = document.createElement('div');
      content.className = 'msg-content';
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      const md = document.createElement('div');
      md.className = 'markdown-body';
      if (type === 'koda') { md.innerHTML = marked.parse(text); }
      else { md.textContent = text; }
      bubble.appendChild(md);
      content.appendChild(bubble);
      row.appendChild(avatar);
      row.appendChild(content);
      chatContainer.appendChild(row);
      lucide.createIcons();
      chatContainer.scrollTop = chatContainer.scrollHeight;

      if (salvar && chatIdAtual) {
        conversas[chatIdAtual].mensagens.push({ text, type });
        if (type === 'user' && conversas[chatIdAtual].titulo === 'Nova conversa') {
          conversas[chatIdAtual].titulo = text.length > 28 ? text.substring(0,25)+'...' : text;
          renderizarListaHistorico();
        }
        localStorage.setItem('koda_chats', JSON.stringify(conversas));
      }
    }

    function novoChat() {
      chatIdAtual = 'chat_' + Date.now();
      conversas[chatIdAtual] = { titulo: 'Nova conversa', mensagens: [] };
      localStorage.setItem('koda_current_chat_id', chatIdAtual);
      localStorage.setItem('koda_chats', JSON.stringify(conversas));
      chatContainer.innerHTML = '';
      renderizarListaHistorico();
      appendMessage('Sistemas online. Pronto.', 'koda', true);
    }

    function carregarConversa(id) {
      if (!conversas[id]) return;
      chatIdAtual = id;
      localStorage.setItem('koda_current_chat_id', id);
      chatContainer.innerHTML = '';
      conversas[id].mensagens.forEach(m => appendMessage(m.text, m.type, false));
      renderizarListaHistorico();
      if (window.innerWidth < 768) fecharSidebar();
    }

    function deletarConversa(id, event) {
      event.stopPropagation();
      delete conversas[id];
      localStorage.setItem('koda_chats', JSON.stringify(conversas));
      if (chatIdAtual === id) { novoChat(); }
      else { renderizarListaHistorico(); }
    }

    function limparTodoHistorico() {
      if (confirm('Apagar todo o historico?')) {
        conversas = {};
        localStorage.clear();
        novoChat();
      }
    }

    function renderizarListaHistorico() {
      historyList.innerHTML = '';
      const ids = Object.keys(conversas).sort((a,b) => b.split('_')[1] - a.split('_')[1]);
      ids.forEach(id => {
        const ativo = id === chatIdAtual;
        const div = document.createElement('div');
        div.className = 'hist-item' + (ativo ? ' active' : '');
        div.onclick = () => carregarConversa(id);
        div.innerHTML = '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escapeHtml(conversas[id].titulo)+'</span><button class="del-btn" onclick="deletarConversa(\''+id+'\', event)"><i data-lucide="x" class="w-3 h-3"></i></button>';
        historyList.appendChild(div);
      });
      lucide.createIcons();
    }

    function checkEnter(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        enviarMensagem();
      }
    }

    function atualizarIndicadorFoto() {
      const input = document.getElementById('image-input');
      const container = document.getElementById('image-preview-container');
      if (input.files && input.files[0]) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById('image-preview').src = e.target.result;
          document.getElementById('preview-filename').textContent = file.name;
          document.getElementById('preview-filesize').textContent = (file.size / 1024).toFixed(1) + ' KB';
          container.classList.add('show');
        };
        reader.readAsDataURL(file);
      }
    }

    function removerImagemAnexa() {
      document.getElementById('image-input').value = '';
      document.getElementById('image-preview-container').classList.remove('show');
    }

    async function enviarMensagem() {
      const texto = userInput.value.trim();
      const imageInput = document.getElementById('image-input');
      const temImagem = imageInput.files && imageInput.files[0];
      if (!texto && !temImagem) return;

      appendMessage(temImagem ? '[Imagem: ' + imageInput.files[0].name + '] ' + texto : texto, 'user');
      userInput.value = '';
      userInput.style.height = '44px';
      sendBtn.style.opacity = '0.25';

      const formData = new FormData();
      formData.append('mensagem', texto);
      formData.append('session_id', chatIdAtual);
      if (temImagem) formData.append('imagem', imageInput.files[0]);
      removerImagemAnexa();

      try {
        const res = await fetch('/chat', { method: 'POST', body: formData });
        const dados = await res.json();
        if (dados.resposta) {
          appendMessage(dados.resposta, 'koda');
        }
        if (dados.fluxo) {
          dados.fluxo.forEach(item => {
            if (item.type === 'tool_call') {
              let msg = item.tool_name || 'ferramenta';
              if (item.tool_args) {
                const args = typeof item.tool_args === 'string' ? item.tool_args : JSON.stringify(item.tool_args);
                if (args.length > 40) msg += ': ' + args.substring(0,40) + '...';
                else msg += ': ' + args;
              }
              showToast('\u2699\uFE0F ' + msg, 'tool', 2500);
            } else if (item.type === 'tool_results' && item.content) {
              const results = Array.isArray(item.content) ? item.content : [item.content];
              results.forEach(r => {
                if (r.success) showToast('\u2705 ' + (r.tool || '') + ': ' + (r.output ? r.output.substring(0, 60) : 'ok'), 'success', 3000);
                else if (r.error) showToast('\u274C ' + (r.tool || '') + ': ' + r.error.substring(0, 60), 'error', 4000);
              });
            }
          });
        }
      } catch(e) {
        appendMessage('Erro de conexao.', 'koda');
      }
    }

    init();
  </script>
</body>
</html>
