<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Koda</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #e8e8ea;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      height: 100vh; overflow: hidden; display: flex; flex-direction: column;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
    .hidden { display: none !important; }
    ::selection { background: rgba(99,102,241,0.3); }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; background: #000; flex-shrink: 0; z-index: 10;
    }
    .h-left { display: flex; align-items: center; gap: 12px; }
    .h-logo { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; color: #fff; }
    .h-model { font-size: 11px; color: #555; padding: 3px 10px; border: 1px solid #222; border-radius: 12px; white-space: nowrap; }
    .h-right { display: flex; align-items: center; gap: 8px; }
    .h-btn {
      background: none; border: 1px solid #222; color: #888;
      padding: 6px 14px; border-radius: 20px; cursor: pointer;
      font-size: 12px; transition: all 0.15s;
      display: flex; align-items: center; gap: 5px;
    }
    .h-btn:hover { border-color: #444; color: #ccc; }
    .h-btn svg { width: 14px; height: 14px; }

    #chat-container {
      flex: 1; overflow-y: auto;
      padding: 20px 16px 8px;
      max-width: 720px; width: 100%;
      margin: 0 auto;
    }
    #chat-container:empty::after { content: ''; flex: 1; }

    .msg-row { display: flex; gap: 10px; margin-bottom: 20px; animation: fadeIn 0.2s ease; }
    .msg-row.user { flex-direction: row-reverse; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 11px; font-weight: 600;
    }
    .msg-row.user .msg-avatar { background: #222; color: #888; }
    .msg-row.koda .msg-avatar { background: #111; color: #666; }
    .msg-row.koda .msg-avatar svg { width: 15px; height: 15px; }

    .msg-content { max-width: 85%; display: flex; flex-direction: column; gap: 6px; }
    .msg-bubble { padding: 10px 16px; font-size: 14px; line-height: 1.6; }
    .msg-row.user .msg-bubble { background: #1a1a2e; border-radius: 16px 16px 4px 16px; color: #e8e8ea; }
    .msg-row.koda .msg-bubble { background: #111; border-radius: 16px 16px 16px 4px; color: #d0d0d4; }

    .markdown-body p { margin-bottom: 6px; }
    .markdown-body p:last-child { margin-bottom: 0; }
    .markdown-body strong { color: #fff; font-weight: 600; }
    .markdown-body code { background: #1a1a2e; padding: 2px 6px; border-radius: 6px; font-size: 12.5px; font-family: 'SF Mono', 'JetBrains Mono', monospace; color: #a78bfa; }
    .markdown-body pre {
      background: #0a0a0f; border: 1px solid #1a1a2e; padding: 0;
      border-radius: 12px; margin: 8px 0; overflow: hidden; position: relative;
    }
    .markdown-body pre .copy-btn {
      position: absolute; top: 6px; right: 6px;
      background: #1a1a2e; border: 1px solid #222; color: #666;
      width: 28px; height: 28px; border-radius: 6px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; opacity: 0;
    }
    .markdown-body pre:hover .copy-btn { opacity: 1; }
    .markdown-body pre .copy-btn:hover { background: #222; color: #a78bfa; border-color: #a78bfa; }
    .markdown-body pre .copy-btn svg { width: 14px; height: 14px; }
    .markdown-body pre code {
      display: block; padding: 14px 16px; overflow-x: auto; background: none; color: #bbb;
    }
    .markdown-body ul, .markdown-body ol { padding-left: 20px; margin-bottom: 6px; }
    .markdown-body a { color: #6366f1; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { color: #fff; margin: 10px 0 4px; }
    .markdown-body blockquote { border-left: 2px solid #333; padding-left: 12px; color: #888; margin: 8px 0; }

    footer { flex-shrink: 0; padding: 8px 16px 20px; }
    .input-wrap { max-width: 720px; margin: 0 auto; position: relative; }
    #image-preview-container {
      display: none; align-items: center; gap: 10px; padding: 8px 12px;
      margin-bottom: 8px; background: #111; border-radius: 12px; border: 1px solid #1a1a2e; animation: fadeIn 0.2s ease;
    }
    #image-preview-container.show { display: flex; }
    #image-preview { width: 34px; height: 34px; object-fit: cover; border-radius: 8px; border: 1px solid #222; }
    .preview-info { flex: 1; font-size: 11px; }
    .preview-info .name { color: #d0d0d4; }
    .preview-info .size { color: #555; font-size: 10px; }
    .preview-remove { background: none; border: none; color: #555; cursor: pointer; padding: 4px; border-radius: 50%; }
    .preview-remove:hover { color: #ef4444; }

    .input-area {
      display: flex; align-items: flex-end;
      background: #111; border: 1px solid #222; border-radius: 16px;
      padding: 4px 4px 4px 16px; transition: border-color 0.15s;
    }
    .input-area:focus-within { border-color: #444; }
    .input-area textarea {
      flex: 1; background: none; border: none; color: #e8e8ea;
      font-size: 14px; font-family: inherit; padding: 10px 4px;
      resize: none; outline: none; line-height: 1.4; max-height: 100px;
    }
    .input-area textarea::placeholder { color: #444; }
    .input-actions { display: flex; align-items: center; gap: 2px; padding-bottom: 2px; }
    .input-actions button {
      background: none; border: none; color: #555;
      width: 32px; height: 32px; border-radius: 50%;
      cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .input-actions button:hover { background: #1a1a2e; }
    .input-actions button svg { width: 17px; height: 17px; }
    .send-btn { background: #fff !important; color: #000 !important; border-radius: 50% !important; width: 32px !important; height: 32px !important; opacity: 0.25; }
    .send-btn.active { opacity: 1; }

    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; display: none; }
    .sidebar-overlay.open { display: block; }
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 280px;
      background: #0a0a0f; border-right: 1px solid #1a1a2e; z-index: 50;
      transform: translateX(-100%); transition: transform 0.25s ease;
      display: flex; flex-direction: column;
    }
    #sidebar.open { transform: translateX(0); }
    .sh { padding: 18px 16px 10px; display: flex; justify-content: space-between; align-items: center; }
    .sh span { font-size: 16px; font-weight: 600; color: #fff; }
    .sh-close { background: none; border: none; color: #555; cursor: pointer; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .sh-close:hover { background: #111; }
    #history-list { flex: 1; overflow-y: auto; padding: 4px 12px; }
    .hist-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 10px; cursor: pointer; font-size: 13px; color: #888; transition: all 0.1s; margin-bottom: 2px; }
    .hist-item:hover { background: #111; }
    .hist-item.active { background: #1a1a2e; color: #d0d0d4; }
    .hist-item .del-btn { opacity: 0; background: none; border: none; color: #555; cursor: pointer; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .hist-item:hover .del-btn { opacity: 1; }
    .hist-item .del-btn:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
    .sf { padding: 14px 16px; border-top: 1px solid #1a1a2e; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #444; }
    .sf button { background: none; border: none; color: #555; cursor: pointer; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .sf button:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
    .sf button svg { width: 13px; height: 13px; }

    @media (max-width: 600px) {
      header { padding: 10px 14px; }
      #chat-container { padding: 14px 10px 4px; }
      footer { padding: 6px 10px 16px; }
      .msg-content { max-width: 90%; }
    }

    #toast-container {
      position: fixed; bottom: 80px; right: 16px; z-index: 100;
      display: flex; flex-direction: column-reverse; gap: 6px; pointer-events: none;
    }
    .toast {
      padding: 8px 14px; border-radius: 10px; font-size: 12px;
      background: #13131a; border: 1px solid #1e1e2e; color: #bbb;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      animation: toastIn 0.25s ease; max-width: 280px;
      display: flex; align-items: center; gap: 8px; line-height: 1.4;
      pointer-events: auto; backdrop-filter: blur(10px);
    }
    .toast-icon { width: 16px; height: 16px; flex-shrink: 0; }
    .toast-icon.loading { animation: spin 1s linear infinite; }
    .toast-icon.success { color: #34d399; }
    .toast-icon.error { color: #ef4444; }
    .toast-icon.info { color: #6366f1; }
    .toast-text { flex: 1; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .toast.removing { animation: toastOut 0.2s ease forwards; }
    @keyframes toastOut { to { opacity: 0; transform: translateY(4px) scale(0.95); } }

    .thinking-indicator {
      display: flex; gap: 4px; padding: 4px 0; margin-left: 40px;
    }
    .thinking-indicator span {
      width: 6px; height: 6px; border-radius: 50%; background: #555;
      animation: thinkingBounce 1.2s ease-in-out infinite;
    }
    .thinking-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes thinkingBounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .agent-step {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 0; font-size: 12px; color: #666;
      margin-left: 40px; animation: fadeIn 0.15s ease;
    }
    .agent-step .step-icon { width: 16px; height: 16px; flex-shrink: 0; }
    .agent-step.step-tool { color: #a78bfa; }
    .agent-step.step-done { color: #34d399; }
    .agent-step.step-error { color: #ef4444; }
    .agent-step.step-thinking { color: #fbbf24; }

    .streaming-cursor::after {
      content: '|';
      animation: blink 0.7s step-end infinite;
      color: #a78bfa;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .keyboard-hint {
      position: absolute; bottom: -18px; right: 4px;
      font-size: 10px; color: #333;
    }
  </style>
</head>
<body>

  <div class="sidebar-overlay" id="sidebar-overlay" onclick="fecharSidebar()"></div>
  <aside id="sidebar">
    <div class="sh">
      <span>Histórico</span>
      <button class="sh-close" onclick="fecharSidebar()"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <div id="history-list"></div>
    <div class="sf">
      <span id="token-counter">0 tokens</span>
      <button onclick="limparTodoHistorico()" title="Limpar tudo"><i data-lucide="trash-2"></i></button>
    </div>
  </aside>

  <header>
    <div class="h-left">
      <button class="h-btn" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
      <span class="h-logo">Koda</span>
      <span class="h-model">Groq · 70B</span>
    </div>
    <div class="h-right">
      <button class="h-btn" onclick="novoChat()"><i data-lucide="square-pen"></i>Novo chat</button>
    </div>
  </header>

  <div id="chat-container"></div>

  <div id="toast-container"></div>

  <div id="image-preview-container">
    <img id="image-preview" src="" alt="preview" />
    <div class="preview-info">
      <div class="name" id="preview-filename">arquivo.png</div>
      <div class="size" id="preview-filesize">0 KB</div>
    </div>
    <button class="preview-remove" onclick="removerImagemAnexa()"><i data-lucide="x"></i></button>
  </div>

  <footer>
    <div class="input-wrap">
      <div class="input-area">
        <textarea id="user-input" placeholder="Digite sua mensagem..." rows="1" onkeydown="checkEnter(event)" oninput="autoGrow(this)"></textarea>
        <input type="file" id="image-input" accept="image/*" class="hidden" onchange="atualizarIndicadorFoto()" />
        <div class="input-actions">
          <button onclick="document.getElementById('image-input').click()" title="Anexar imagem"><i data-lucide="paperclip"></i></button>
          <button class="send-btn" id="send-btn" onclick="enviarMensagem()"><i data-lucide="arrow-up"></i></button>
        </div>
      </div>
      <div class="keyboard-hint">Enter para enviar · Shift+Enter para nova linha</div>
    </div>
  </footer>

  <script>
    marked.setOptions({ breaks: true, gfm: true });
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const historyList = document.getElementById('history-list');
    const sendBtn = document.getElementById('send-btn');
    const toastContainer = document.getElementById('toast-container');

    let conversas = JSON.parse(localStorage.getItem('koda_chats')) || {};
    let chatIdAtual = localStorage.getItem('koda_current_chat_id') || null;
    let streaming = false;
    let currentStreamRow = null;
    let currentStreamBubble = null;
    let currentStreamMd = null;
    let abortController = null;

    /* ========= TOASTS ========= */
    function showToast(message, type = 'info', duration = 3000) {
      const icons = { info: 'circle-alert', loading: 'loader-2', success: 'check-circle-2', error: 'alert-circle', tool: 'zap' };
      const iconName = icons[type] || 'circle-alert';
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<i data-lucide="${iconName}" class="toast-icon ${type}"></i><span class="toast-text">${message}</span>`;
      toastContainer.appendChild(toast);
      lucide.createIcons();
      if (type !== 'loading') {
        setTimeout(() => {
          toast.classList.add('removing');
          setTimeout(() => { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 200);
        }, duration);
      }
      return toast;
    }

    function removeAllToasts() { toastContainer.innerHTML = ''; }

    /* ========= CHAT ========= */
    function init() {
      lucide.createIcons();
      renderizarListaHistorico();
      if (chatIdAtual && conversas[chatIdAtual]) { carregarConversa(chatIdAtual); }
      else { novoChat(); }
      userInput.addEventListener('input', () => {
        sendBtn.style.opacity = userInput.value.trim() ? '1' : '0.25';
      });
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebar-overlay').classList.toggle('open');
    }
    function fecharSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.remove('open');
    }
    function autoGrow(el) {
      el.style.height = 'auto';
      el.style.height = (el.value === '' ? '44px' : Math.min(el.scrollHeight, 120)) + 'px';
    }
    function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function appendMessage(text, type, salvar = true) {
      const row = document.createElement('div');
      row.className = 'msg-row ' + type;
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      if (type === 'user') { avatar.textContent = 'U'; }
      else { avatar.innerHTML = '<i data-lucide="sparkles"></i>'; }

      const content = document.createElement('div');
      content.className = 'msg-content';
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      const md = document.createElement('div');
      md.className = 'markdown-body';
      if (type === 'koda') {
        md.innerHTML = marked.parse(text);
        addCopyButtons(md);
      } else {
        md.textContent = text;
      }
      bubble.appendChild(md);
      content.appendChild(bubble);
      row.appendChild(avatar);
      row.appendChild(content);
      chatContainer.appendChild(row);
      lucide.createIcons();
      chatContainer.scrollTop = chatContainer.scrollHeight;

      if (salvar && chatIdAtual) {
        conversas[chatIdAtual].mensagens.push({ text, type });
        if (type === 'user' && conversas[chatIdAtual].titulo === 'Nova conversa') {
          conversas[chatIdAtual].titulo = text.length > 28 ? text.substring(0,25)+'...' : text;
          renderizarListaHistorico();
        }
        localStorage.setItem('koda_chats', JSON.stringify(conversas));
      }
    }

    function addCopyButtons(container) {
      container.querySelectorAll('pre').forEach(pre => {
        if (pre.querySelector('.copy-btn')) return;
        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.innerHTML = '<i data-lucide="copy"></i>';
        btn.title = 'Copiar código';
        btn.onclick = () => {
          const code = pre.querySelector('code');
          const text = code ? code.textContent : '';
          navigator.clipboard.writeText(text).then(() => {
            btn.innerHTML = '<i data-lucide="check"></i>';
            lucide.createIcons();
            setTimeout(() => {
              btn.innerHTML = '<i data-lucide="copy"></i>';
              lucide.createIcons();
            }, 1500);
          });
        };
        pre.appendChild(btn);
        pre.style.position = 'relative';
      });
    }

    function createStreamRow() {
      currentStreamRow = document.createElement('div');
      currentStreamRow.className = 'msg-row koda';
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.innerHTML = '<i data-lucide="sparkles"></i>';
      const content = document.createElement('div');
      content.className = 'msg-content';
      currentStreamBubble = document.createElement('div');
      currentStreamBubble.className = 'msg-bubble';
      currentStreamMd = document.createElement('div');
      currentStreamMd.className = 'markdown-body streaming-cursor';
      currentStreamBubble.appendChild(currentStreamMd);
      content.appendChild(currentStreamBubble);
      currentStreamRow.appendChild(avatar);
      currentStreamRow.appendChild(content);
      chatContainer.appendChild(currentStreamRow);
      lucide.createIcons();
    }

    function appendThinkingStep(type, message) {
      const step = document.createElement('div');
      step.className = `agent-step step-${type}`;
      const icons = { tool: 'zap', done: 'check-circle-2', error: 'alert-circle', thinking: 'loader-2' };
      step.innerHTML = `<i data-lucide="${icons[type] || 'circle'}" class="step-icon"></i><span>${message}</span>`;
      if (currentStreamRow) {
        const content = currentStreamRow.querySelector('.msg-content');
        if (content) content.appendChild(step);
        else currentStreamRow.appendChild(step);
      } else {
        chatContainer.appendChild(step);
      }
      lucide.createIcons();
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeThinkingSteps() {
      if (currentStreamRow) {
        currentStreamRow.querySelectorAll('.agent-step').forEach(el => el.remove());
      }
    }

    function updateStreamContent(text) {
      if (!currentStreamMd) return;
      currentStreamMd.innerHTML = marked.parse(text);
      addCopyButtons(currentStreamMd);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function finalizeStream(fullText) {
      if (!currentStreamMd) return;
      currentStreamMd.classList.remove('streaming-cursor');
      currentStreamMd.innerHTML = marked.parse(fullText);
      addCopyButtons(currentStreamMd);
      currentStreamRow = null;
      currentStreamBubble = null;
      currentStreamMd = null;
    }

    function novoChat() {
      if (streaming) cancelarStream();
      chatIdAtual = 'chat_' + Date.now();
      conversas[chatIdAtual] = { titulo: 'Nova conversa', mensagens: [] };
      localStorage.setItem('koda_current_chat_id', chatIdAtual);
      localStorage.setItem('koda_chats', JSON.stringify(conversas));
      chatContainer.innerHTML = '';
      renderizarListaHistorico();
      appendMessage('Sistemas online. Pronto.', 'koda', true);
    }

    function carregarConversa(id) {
      if (streaming) cancelarStream();
      if (!conversas[id]) return;
      chatIdAtual = id;
      localStorage.setItem('koda_current_chat_id', id);
      chatContainer.innerHTML = '';
      conversas[id].mensagens.forEach(m => appendMessage(m.text, m.type, false));
      renderizarListaHistorico();
      if (window.innerWidth < 768) fecharSidebar();
    }

    function deletarConversa(id, event) {
      event.stopPropagation();
      delete conversas[id];
      localStorage.setItem('koda_chats', JSON.stringify(conversas));
      if (chatIdAtual === id) { novoChat(); }
      else { renderizarListaHistorico(); }
    }

    function limparTodoHistorico() {
      if (confirm('Apagar todo o histórico?')) {
        conversas = {};
        localStorage.clear();
        novoChat();
      }
    }

    function renderizarListaHistorico() {
      historyList.innerHTML = '';
      const ids = Object.keys(conversas).sort((a,b) => b.split('_')[1] - a.split('_')[1]);
      ids.forEach(id => {
        const ativo = id === chatIdAtual;
        const div = document.createElement('div');
        div.className = 'hist-item' + (ativo ? ' active' : '');
        div.onclick = () => carregarConversa(id);
        div.innerHTML = '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escapeHtml(conversas[id].titulo)+'</span><button class="del-btn" onclick="deletarConversa(\''+id+'\', event)"><i data-lucide="x" class="w-3 h-3"></i></button>';
        historyList.appendChild(div);
      });
      lucide.createIcons();
    }

    function checkEnter(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        enviarMensagem();
      }
      if (event.key === 'Escape' && streaming) {
        cancelarStream();
      }
    }

    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        novoChat();
      }
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter' && !streaming) {
        e.preventDefault();
        enviarMensagem();
      }
    });

    function atualizarIndicadorFoto() {
      const input = document.getElementById('image-input');
      const container = document.getElementById('image-preview-container');
      if (input.files && input.files[0]) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById('image-preview').src = e.target.result;
          document.getElementById('preview-filename').textContent = file.name;
          document.getElementById('preview-filesize').textContent = (file.size / 1024).toFixed(1) + ' KB';
          container.classList.add('show');
        };
        reader.readAsDataURL(file);
      }
    }

    function removerImagemAnexa() {
      document.getElementById('image-input').value = '';
      document.getElementById('image-preview-container').classList.remove('show');
    }

    function cancelarStream() {
      if (abortController) {
        abortController.abort();
        abortController = null;
      }
      streaming = false;
      if (currentStreamMd) {
        currentStreamMd.classList.remove('streaming-cursor');
      }
      currentStreamRow = null;
      currentStreamBubble = null;
      currentStreamMd = null;
      sendBtn.disabled = false;
      sendBtn.style.opacity = userInput.value.trim() ? '1' : '0.25';
    }

    async function enviarMensagem() {
      const texto = userInput.value.trim();
      const imageInput = document.getElementById('image-input');
      const temImagem = imageInput.files && imageInput.files[0];
      if (!texto && !temImagem) return;
      if (streaming) return;

      appendMessage(temImagem ? '[Imagem: ' + imageInput.files[0].name + '] ' + texto : texto, 'user');
      userInput.value = '';
      userInput.style.height = '44px';
      sendBtn.style.opacity = '0.25';

      const formData = new FormData();
      formData.append('mensagem', texto);
      formData.append('session_id', chatIdAtual);
      if (temImagem) formData.append('imagem', imageInput.files[0]);
      removerImagemAnexa();

      streaming = true;
      sendBtn.disabled = true;
      createStreamRow();

      try {
        abortController = new AbortController();
        const res = await fetch('/chat/stream', {
          method: 'POST',
          body: formData,
          signal: abortController.signal
        });

        if (!res.ok) {
          updateStreamContent('Erro de conexão.');
          finalizeStream('Erro de conexão.');
          streaming = false;
          sendBtn.disabled = false;
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullText = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (!data) continue;

            try {
              const event = JSON.parse(data);

              switch (event.type) {
                case 'token':
                  fullText += event.content;
                  updateStreamContent(fullText);
                  break;
                case 'thinking':
                  appendThinkingStep('thinking', event.content);
                  break;
                case 'tool_call':
                  appendThinkingStep('tool', `🔧 ${event.tool}`);
                  break;
                case 'tool_result':
                  appendThinkingStep('done', `✅ ${event.tool}: ${event.output ? event.output.substring(0, 60) : 'ok'}`);
                  break;
                case 'tool_error':
                  appendThinkingStep('error', `❌ ${event.tool}: ${event.error}`);
                  break;
                case 'status':
                  if (event.content === 'streaming') {
                    removeThinkingSteps();
                  }
                  break;
                case 'done':
                  removeThinkingSteps();
                  finalizeStream(event.content);
                  if (chatIdAtual) {
                    conversas[chatIdAtual].mensagens.push({ text: event.content, type: 'koda' });
                    localStorage.setItem('koda_chats', JSON.stringify(conversas));
                  }
                  break;
                case 'error':
                  updateStreamContent(event.content);
                  finalizeStream(event.content);
                  break;
              }
            } catch (e) {
              console.error('SSE parse error:', e);
            }
          }
        }
      } catch (e) {
        if (e.name === 'AbortError') return;
        const errMsg = 'Erro de conexão.';
        if (currentStreamMd) {
          currentStreamMd.classList.remove('streaming-cursor');
          currentStreamMd.textContent = errMsg;
        }
      } finally {
        streaming = false;
        sendBtn.disabled = false;
        sendBtn.style.opacity = userInput.value.trim() ? '1' : '0.25';
        abortController = null;
      }
    }

    init();
  </script>
</body>
</html>
