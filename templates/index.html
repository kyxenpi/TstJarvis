<!doctype html>
<html lang="pt-BR" class="h-full bg-[#121214]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Koda OS v2.1</title>
    <link
      id="dynamic-favicon"
      rel="shortcut icon"
      href="/static/logo.png"
      type="image/png"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      :root {
        --bg-main: #121214;
        --bg-panel: #16161a;
        --bg-input: #19191e;
        --border-panel: #1f1f24;
        --border-input: #2d2d35;
        --text-base: #d4d4d8;
        --text-strong: #ffffff;
        --text-muted: #71717a;
        --accent: #10b981;
        --accent-glow: rgba(16, 185, 129, 0.4);
      }

      /* Ultra Subtle Scrollbars */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-panel);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--border-input);
      }

      /* Markdown Styling (More Spacious & Elegant) */
      .markdown-content p {
        margin-bottom: 1rem;
        line-height: 1.7;
      }
      .markdown-content p:last-child {
        margin-bottom: 0;
      }
      .markdown-content strong {
        color: var(--text-strong);
        font-weight: 600;
      }
      .markdown-content ul,
      .markdown-content ol {
        margin-bottom: 1rem;
        padding-left: 1.75rem;
      }
      .markdown-content ul {
        list-style-type: square;
      }
      .markdown-content ol {
        list-style-type: decimal;
      }
      .markdown-content li {
        margin-bottom: 0.6rem;
        line-height: 1.7;
      }
      .markdown-content pre {
        background-color: var(--bg-input);
        border: 1px solid var(--border-panel);
        padding: 1.25rem;
        border-radius: 0.75rem;
        margin: 1.25rem 0;
        overflow-x: auto;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        font-size: 0.825rem;
      }
      .markdown-content code {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        background-color: var(--border-panel);
        padding: 0.2rem 0.4rem;
        border-radius: 0.375rem;
        font-size: 0.85em;
        color: #fca5a5;
      }
      .markdown-content pre code {
        background-color: transparent;
        padding: 0;
        color: var(--text-base);
      }
    </style>
  </head>
  <body
    class="h-full text-[var(--text-base)] font-sans flex antialiased overflow-hidden bg-[var(--bg-main)]"
  >
    <aside
      id="sidebar"
      class="w-68 h-full bg-[var(--bg-panel)] border-r border-[var(--border-panel)] flex flex-col justify-between shrink-0 transition-transform duration-300 md:translate-x-0 -translate-x-full fixed md:static z-40"
    >
      <div class="p-4 space-y-6 flex flex-col h-full overflow-hidden">
        <button
          onclick="novoChat()"
          class="w-full flex items-center justify-between border border-[var(--border-input)] hover:bg-[var(--border-panel)] rounded-xl px-4 py-3 text-xs text-zinc-100 transition-all font-medium group"
        >
          <span class="flex items-center gap-2.5">
            <i
              data-lucide="plus"
              class="w-4 h-4 text-zinc-500 group-hover:text-white transition-colors"
            ></i>
            Nova conversa
          </span>
          <kbd
            class="text-[10px] text-zinc-600 font-mono border border-[var(--border-panel)] px-1.5 py-0.5 rounded bg-[var(--bg-main)]"
            >Ctrl + N</kbd
          >
        </button>

        <div
          class="p-4 bg-[var(--bg-main)] border border-[var(--border-panel)] rounded-xl font-mono text-[10px] text-zinc-500 space-y-1.5 mx-1"
        >
          <div
            class="flex justify-between items-center text-[10px] uppercase font-bold text-zinc-600 tracking-wider mb-2"
          >
            <span>Hardware Status</span>
            <span
              class="w-1.5 h-1.5 bg-[var(--accent)] rounded-full shadow-[0_0_8px_var(--accent-glow)]"
            ></span>
          </div>
          <div class="flex justify-between">
            <span>CPU:</span><span id="hw-cpu" class="text-zinc-200">0%</span>
          </div>
          <div class="flex justify-between">
            <span>RAM:</span><span id="hw-ram" class="text-zinc-200">0%</span>
          </div>
        </div>

        <div class="flex-1 overflow-y-auto space-y-2 pr-1">
          <p
            class="text-[10px] font-semibold text-zinc-600 px-2 uppercase tracking-wider mb-2.5"
          >
            Recentes
          </p>
          <div id="history-list" class="space-y-1"></div>
        </div>
      </div>

      <div
        class="p-4 border-t border-[var(--border-panel)] text-[11px] text-zinc-600 font-mono flex justify-between items-center bg-[var(--bg-panel)]"
      >
        <span>Histórico Salvo</span>
        <button
          onclick="limparTodoHistorico()"
          class="hover:text-red-400 transition-colors p-1 rounded-md hover:bg-[var(--border-panel)]"
          title="Limpar tudo"
        >
          <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
        </button>
      </div>
    </aside>

    <div
      class="flex-1 flex flex-col h-full overflow-hidden bg-[var(--bg-main)]"
    >
      <header
        class="border-b border-[var(--border-panel)] bg-[var(--bg-main)]/80 backdrop-blur-md px-8 py-4 flex items-center justify-between sticky top-0 z-30"
      >
        <div class="flex items-center gap-4">
          <button
            onclick="toggleSidebar()"
            class="md:hidden p-2 hover:bg-[var(--border-panel)] rounded-xl text-zinc-500 transition-colors"
          >
            <i data-lucide="menu" class="w-4 h-4"></i>
          </button>
          <span class="text-sm font-medium tracking-tight text-white"
            >Koda</span
          >
          <span
            class="text-[10px] bg-[var(--border-panel)] text-zinc-500 px-2 py-0.5 rounded-md font-mono border border-[var(--border-input)]"
            >v2.1</span
          >
        </div>
        <div
          class="flex items-center gap-4 text-[11px] font-mono text-zinc-600"
        >
          <span class="flex items-center gap-2"
            ><i data-lucide="cpu" class="w-3.5 h-3.5 text-zinc-500"></i>
            llama-3.3</span
          >
          <span class="text-zinc-800">|</span>
          <span class="flex items-center gap-2 text-zinc-300"
            ><span
              class="w-1.5 h-1.5 rounded-full bg-[var(--accent)] shadow-[0_0_6px_var(--accent-glow)]"
            ></span>
            local-agent</span
          >
        </div>
      </header>

      <main
        id="chat-container"
        class="flex-1 overflow-y-auto px-6 py-10 space-y-10 max-w-3xl w-full mx-auto flex flex-col"
      ></main>

      <footer
        class="p-6 bg-[var(--bg-main)] border-t border-[var(--border-panel)] relative"
      >
        <div class="max-w-3xl w-full mx-auto relative">
          <div
            class="absolute -top-8 right-2 flex items-center gap-2 text-[10px] font-mono text-zinc-600"
          >
            <span
              class="w-1.5 h-1.5 rounded-full bg-emerald-500/60 animate-pulse"
            ></span>
            <span
              >Uso da Sessão:
              <strong id="token-counter" class="text-zinc-500 font-medium"
                >0</strong
              >
              tokens</span
            >
          </div>

          <div
            id="image-preview-container"
            class="hidden mb-3 flex items-center gap-3 bg-[var(--bg-panel)] border border-[var(--border-input)] p-2.5 rounded-xl max-w-max relative animate-fade-in"
          >
            <img
              id="image-preview"
              src=""
              class="h-16 w-16 object-cover rounded-lg border border-[var(--border-input)]"
            />
            <div class="flex flex-col pr-6">
              <span
                id="preview-filename"
                class="text-xs text-zinc-300 font-medium truncate max-w-[180px]"
                >nome_da_imagem.png</span
              >
              <span
                id="preview-filesize"
                class="text-[10px] text-zinc-600 font-mono"
                >0 KB</span
              >
            </div>
            <button
              onclick="removerImagemAnexa()"
              class="absolute -top-1.5 -right-1.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-400 hover:text-white p-1 rounded-full border border-[var(--border-input)] transition-colors"
            >
              <i data-lucide="x" class="w-3 h-3"></i>
            </button>
          </div>

          <div
            class="relative flex flex-col bg-[var(--bg-panel)] border border-[var(--border-input)] rounded-2xl focus-within:border-zinc-700 focus-within:ring-1 focus-within:ring-zinc-700 transition-all p-2.5 pl-5 shadow-inner"
          >
            <div class="flex items-center w-full">
              <textarea
                id="user-input"
                placeholder="Manda a boa..."
                rows="1"
                class="w-full bg-transparent text-[14px] text-white placeholder-zinc-600 pr-3 py-3 focus:outline-none resize-none overflow-hidden h-[46px] leading-relaxed"
                onkeypress="checkEnter(event)"
                oninput="autoGrow(this)"
              ></textarea>

              <input
                type="file"
                id="image-input"
                accept="image/*"
                class="hidden"
                onchange="atualizarIndicadorFoto()"
              />

              <button
                id="clip-btn"
                onclick="document.getElementById('image-input').click()"
                class="p-3 text-zinc-500 hover:text-[var(--accent)] transition-colors mr-1 rounded-xl hover:bg-[var(--border-panel)]"
                title="Anexar imagem"
              >
                <i
                  data-lucide="paperclip"
                  id="clip-icon"
                  class="w-4.5 h-4.5"
                ></i>
              </button>

              <button
                id="mic-btn"
                onclick="alternarGravacao()"
                class="p-3 text-zinc-500 hover:text-red-400 transition-colors mr-1 rounded-xl hover:bg-[var(--border-panel)]"
                title="Gravar comando de voz"
              >
                <i data-lucide="mic" id="mic-icon" class="w-4.5 h-4.5"></i>
              </button>
            </div>

            <div
              class="flex items-center justify-between pt-2.5 pr-1 border-t border-[var(--border-panel)] mt-1.5"
            >
              <span class="text-[10px] text-zinc-600 font-mono tracking-wide"
                >Enter para enviar • Shift + Enter para pular linha</span
              >
              <button
                onclick="enviarMensagem()"
                class="p-2.5 bg-zinc-100 hover:bg-white text-zinc-950 rounded-xl transition-all flex items-center justify-center disabled:opacity-30 shadow-sm"
                id="send-btn"
              >
                <i data-lucide="arrow-up" class="w-4 h-4 stroke-[2.5]"></i>
              </button>
            </div>
          </div>
        </div>
      </footer>
    </div>

    <script>
      marked.setOptions({ breaks: true, gfm: true });

      const chatContainer = document.getElementById("chat-container");
      const userInput = document.getElementById("user-input");
      const historyList = document.getElementById("history-list");
      const sidebar = document.getElementById("sidebar");

      let conversas = JSON.parse(localStorage.getItem("koda_chats")) || {};
      let chatIdAtual = localStorage.getItem("koda_current_chat_id") || null;
      let textoMensagemFixada = null;
      let responderComVozModoAtivo = false;
      let cronometroFoco = null;

      let mediaRecorder;
      let audioChunks = [];
      let gravando = false;
      let gravacaoTimeout;
      let wakeWordAtiva = true;

      const TEMPO_SILENCIO_GRAVACAO = 5000;

      function init() {
        lucide.createIcons();
        renderizarListaHistorico();
        if (chatIdAtual && conversas[chatIdAtual]) {
          carregarConversa(chatIdAtual);
        } else {
          novoChat();
        }
        setInterval(atualizarHardware, 3000);
      }

      async function atualizarHardware() {
        try {
          const response = await fetch("/telemetria");
          const dados = await response.json();
          if (!dados.erro) {
            document.getElementById("hw-cpu").innerText = dados.cpu + "%";
            document.getElementById("hw-ram").innerText = dados.ram + "%";
          }
        } catch (e) {}
      }

      function autoGrow(element) {
        element.style.height = "auto";
        element.style.height =
          element.value === "" ? "46px" : element.scrollHeight + "px";
      }

      function toggleSidebar() {
        sidebar.classList.toggle("-translate-x-full");
      }

      function formatarRespostaKoda(text) {
        const textoLimpo = text.trim();
        if (textoLimpo.startsWith("{") && textoLimpo.endsWith("}")) {
          return `<div class="opacity-40 flex items-center gap-2 font-mono text-xs text-zinc-500"><i data-lucide="loader-2" class="w-3.5 h-3.5 animate-spin"></i> Executando chamada interna da ferramenta...</div>`;
        }
        try {
          return marked.parse(text);
        } catch (e) {
          return escapeHtml(text);
        }
      }

      function alternarPin(texto, elementoBotao) {
        if (textoMensagemFixada === texto) {
          textoMensagemFixada = null;
          document
            .querySelectorAll(".pin-btn")
            .forEach((b) => b.classList.remove("text-[var(--accent)]"));
          removerAlertaFixadoVisual();
        } else {
          textoMensagemFixada = texto;
          document
            .querySelectorAll(".pin-btn")
            .forEach((b) => b.classList.remove("text-[var(--accent)]"));
          elementoBotao.classList.add("text-[var(--accent)]");
          mostrarAlertaFixadoVisual();
        }
      }

      function mostrarAlertaFixadoVisual() {
        removerAlertaFixadoVisual();
        const alerta = document.createElement("div");
        alerta.id = "alerta-fixado";
        alerta.className =
          "fixed bottom-32 left-1/2 -translate-x-1/2 bg-[var(--bg-panel)] border border-[var(--border-input)] px-5 py-2.5 rounded-xl text-xs text-[var(--accent)] flex items-center gap-2 shadow-2xl font-mono z-50 animate-bounce";
        alerta.innerHTML = `<i data-lucide="pin" class="w-3.5 h-3.5 fill-[var(--accent)]"></i> Contexto fixado para o próximo prompt`;
        document.body.appendChild(alerta);
        lucide.createIcons();
      }

      function removerAlertaFixadoVisual() {
        const existente = document.getElementById("alerta-fixado");
        if (existente) existente.remove();
      }

      function appendMessage(text, type, salvar = true) {
        const msgDiv = document.createElement("div");
        msgDiv.className =
          "flex items-start gap-5 group animate-fade-in relative w-full pb-2";

        const textoEscapadoProBotao = text
          .replace(/'/g, "\\'")
          .replace(/"/g, "&quot;");

        const botaoPin =
          type === "user" || (type === "koda" && !text.trim().startsWith("{"))
            ? `<button onclick="alternarPin('${textoEscapadoProBotao}', this)" class="pin-btn opacity-0 group-hover:opacity-100 absolute right-0 top-0 text-zinc-500 hover:text-[var(--accent)] transition-all p-1.5 rounded-lg hover:bg-[var(--border-panel)]" title="Fixar mensagem como contexto">
                <i data-lucide="pin" class="w-3.5 h-3.5"></i>
               </button>`
            : "";

        if (type === "user") {
          msgDiv.innerHTML = `
                    <div class="w-8 h-8 rounded-xl bg-[var(--bg-main)] flex items-center justify-center text-zinc-200 shrink-0 mt-0.5 font-mono text-xs font-bold border border-[var(--border-panel)]">U</div>
                    <div class="space-y-1.5 flex-1 pr-8 overflow-hidden">
                        <p class="text-xs font-semibold text-zinc-600 tracking-wide">Você</p>
                        <div class="text-[14px] text-zinc-100 leading-relaxed break-words">${escapeHtml(text)}</div>
                    </div>
                    ${botaoPin}`;
        } else if (type === "koda") {
          const conteudoHtml = formatarRespostaKoda(text);
          msgDiv.innerHTML = `
                    <div class="w-8 h-8 rounded-xl bg-[var(--bg-panel)] border border-[var(--border-input)] flex items-center justify-center text-zinc-200 shrink-0 mt-0.5 shadow-sm"><i data-lucide="sparkles" class="w-3.5 h-3.5 text-zinc-300"></i></div>
                    <div class="space-y-2 flex-1 pr-8 overflow-hidden">
                        <p class="text-xs font-semibold text-zinc-600 tracking-wide">Koda</p>
                        <div class="text-[14px] text-zinc-200 leading-relaxed markdown-content break-words">${conteudoHtml}</div>
                    </div>
                    ${botaoPin}`;

          if (
            salvar &&
            !text.trim().startsWith("{") &&
            responderComVozModoAtivo
          ) {
            falarTexto(text);
            responderComVozModoAtivo = false;
          }
        }

        chatContainer.appendChild(msgDiv);
        lucide.createIcons();
        chatContainer.scrollTop = chatContainer.scrollHeight;

        if (salvar && chatIdAtual) {
          conversas[chatIdAtual].mensagens.push({ text, type });
          if (
            type === "user" &&
            conversas[chatIdAtual].titulo === "Nova conversa"
          ) {
            conversas[chatIdAtual].titulo =
              text.length > 28 ? text.substring(0, 25) + "..." : text;
            renderizarListaHistorico();
          }
          localStorage.setItem("koda_chats", JSON.stringify(conversas));
        }
      }

      function novoChat() {
        chatIdAtual = "chat_" + Date.now();
        conversas[chatIdAtual] = { titulo: "Nova conversa", mensagens: [] };
        localStorage.setItem("koda_current_chat_id", chatIdAtual);
        localStorage.setItem("koda_chats", JSON.stringify(conversas));

        textoMensagemFixada = null;
        removerAlertaFixadoVisual();
        chatContainer.innerHTML = "";
        renderizarListaHistorico();
        appendMessage(
          "Sistemas conectados. Qual é a boa de hoje?",
          "koda",
          true,
        );
      }

      function carregarConversa(id) {
        if (!conversas[id]) return;
        chatIdAtual = id;
        localStorage.setItem("koda_current_chat_id", id);
        chatContainer.innerHTML = "";
        textoMensagemFixada = null;
        removerAlertaFixadoVisual();

        conversas[id].mensagens.forEach((msg) => {
          appendMessage(msg.text, msg.type, false);
        });
        renderizarListaHistorico();
        if (
          window.innerWidth < 768 &&
          !sidebar.classList.contains("-translate-x-full")
        ) {
          toggleSidebar();
        }
      }

      function deletarConversa(id, event) {
        event.stopPropagation();
        delete conversas[id];
        localStorage.setItem("koda_chats", JSON.stringify(conversas));
        if (chatIdAtual === id) {
          chatIdAtual = null;
          localStorage.removeItem("koda_current_chat_id");
          novoChat();
        } else {
          renderizarListaHistorico();
        }
      }

      function limparTodoHistorico() {
        if (confirm("Deseja apagar permanentemente todo seu histórico?")) {
          conversas = {};
          localStorage.clear();
          novoChat();
        }
      }

      function renderizarListaHistorico() {
        historyList.innerHTML = "";
        const idsOrdenados = Object.keys(conversas).sort(
          (a, b) => b.split("_")[1] - a.split("_")[1],
        );

        idsOrdenados.forEach((id) => {
          const ativo = id === chatIdAtual;
          const itemDiv = document.createElement("div");
          itemDiv.className = `group/item w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-xs font-medium transition-all cursor-pointer ${ativo ? "bg-[var(--bg-main)] border border-[var(--border-panel)] text-white shadow-inner" : "text-zinc-500 border border-transparent hover:bg-[var(--bg-panel)] hover:text-zinc-200"}`;
          itemDiv.setAttribute("onclick", `carregarConversa('${id}')`);

          itemDiv.innerHTML = `
                    <span class="truncate flex items-center gap-2.5 max-w-[80%]">
                        <i data-lucide="message-square" class="w-3.5 h-3.5 shrink-0 opacity-60"></i>
                        ${escapeHtml(conversas[id].titulo)}
                    </span>
                    <button onclick="deletarConversa('${id}', event)" class="opacity-0 group-hover/item:opacity-100 hover:text-red-400 transition-all p-1 rounded-md hover:bg-[var(--border-panel)]">
                        <i data-lucide="x" class="w-3.5 h-3.5"></i>
                    </button>
                `;
          historyList.appendChild(itemDiv);
        });
        lucide.createIcons();
      }

      function checkEnter(event) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          enviarMensagem();
        }
      }

      document.addEventListener("keydown", (e) => {
        if (e.ctrlKey && e.key.toLowerCase() === "n") {
          e.preventDefault();
          novoChat();
        }
      });

      function escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      async function alternarGravacao() {
        const micBtn = document.getElementById("mic-btn");
        const micIcon = document.getElementById("mic-icon");

        if (!gravando) {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              audio: true,
            });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = (event) => {
              if (event.data.size > 0) audioChunks.push(event.data);
            };

            mediaRecorder.onstop = async () => {
              clearTimeout(gravacaoTimeout);

              if (audioChunks.length === 0) {
                restaurarBotaoMicPadrao();
                return;
              }

              const audioBlob = new Blob(audioChunks, { type: "audio/webm" });

              micBtn.className =
                "p-3 text-amber-400 animate-spin mr-1 rounded-xl bg-amber-950/10";
              micIcon.setAttribute("data-lucide", "loader-2");
              lucide.createIcons();

              const formData = new FormData();
              formData.append("audio", audioBlob, "comando.webm");

              try {
                const response = await fetch("/transcrever", {
                  method: "POST",
                  body: formData,
                });
                const resultado = await response.json();

                if (resultado.texto && resultado.texto.trim() !== "") {
                  responderComVozModoAtivo = true;
                  userInput.value = resultado.texto;
                  autoGrow(userInput);
                  enviarMensagem();
                }
              } catch (erro) {}

              restaurarBotaoMicPadrao();
            };

            mediaRecorder.start();
            gravando = true;
            micBtn.className =
              "p-3 text-red-400 animate-pulse mr-1 rounded-xl bg-red-950/30 border border-red-900/40";

            gravacaoTimeout = setTimeout(() => {
              if (gravando) {
                audioChunks = [];
                try {
                  mediaRecorder.stream
                    .getTracks()
                    .forEach((track) => track.stop());
                  mediaRecorder.stop();
                } catch (e) {}
                gravando = false;
              }
            }, TEMPO_SILENCIO_GRAVACAO);
          } catch (err) {
            alert("Microfone não acessível.");
          }
        } else {
          try {
            mediaRecorder.stream.getTracks().forEach((track) => track.stop());
            mediaRecorder.stop();
          } catch (e) {}
          gravando = false;
        }
      }

      function restaurarBotaoMicPadrao() {
        const micBtn = document.getElementById("mic-btn");
        const micIcon = document.getElementById("mic-icon");
        if (micBtn && micIcon) {
          micBtn.className =
            "p-3 text-zinc-500 hover:text-red-400 transition-colors mr-1 rounded-xl hover:bg-[var(--border-panel)]";
          micIcon.setAttribute("data-lucide", "mic");
          lucide.createIcons();
        }
      }

      function atualizarIndicadorFoto() {
        const input = document.getElementById("image-input");
        const clipBtn = document.getElementById("clip-btn");
        const previewContainer = document.getElementById(
          "image-preview-container",
        );
        const previewImage = document.getElementById("image-preview");
        const previewFilename = document.getElementById("preview-filename");
        const previewFilesize = document.getElementById("preview-filesize");

        if (input.files && input.files[0]) {
          const file = input.files[0];
          clipBtn.classList.add(
            "text-[var(--accent)]",
            "bg-emerald-950/20",
            "border",
            "border-emerald-900/30",
          );

          const reader = new FileReader();
          reader.onload = function (e) {
            previewImage.src = e.target.result;
            previewFilename.innerText = file.name;
            const tamanhoKB = (file.size / 1024).toFixed(1);
            previewFilesize.innerText = `${tamanhoKB} KB`;
            previewContainer.classList.remove("hidden");
            lucide.createIcons();
          };
          reader.readAsDataURL(file);
        } else {
          removerImagemAnexa();
        }
      }

      function removerImagemAnexa() {
        const input = document.getElementById("image-input");
        const clipBtn = document.getElementById("clip-btn");
        const previewContainer = document.getElementById(
          "image-preview-container",
        );

        input.value = "";
        clipBtn.className =
          "p-3 text-zinc-500 hover:text-[var(--accent)] transition-colors mr-1 rounded-xl hover:bg-[var(--border-panel)]";
        clipBtn.title = "Anexar imagem";
        previewContainer.classList.add("hidden");
      }

      async function enviarMensagem() {
        const texto = userInput.value.trim();
        const imageInput = document.getElementById("image-input");
        const temImagem = imageInput.files && imageInput.files[0];

        if (!texto && !temImagem) return;

        if (temImagem) {
          appendMessage(
            `[Imagem: ${imageInput.files[0].name}] ${texto}`,
            "user",
          );
        } else {
          appendMessage(texto, "user");
        }

        userInput.value = "";
        userInput.style.height = "46px";

        const formData = new FormData();
        formData.append("mensagem", texto);
        formData.append("session_id", chatIdAtual);

        if (temImagem) {
          formData.append("imagem", imageInput.files[0]);
        }

        removerImagemAnexa();

        try {
          const response = await fetch("/chat", {
            method: "POST",
            body: formData,
          });

          const dados = await response.json();

          if (dados.tokens_usados) {
            const elementoContador = document.getElementById("token-counter");
            elementoContador.innerText =
              parseInt(elementoContador.innerText) + dados.tokens_usados;
          }

          if (dados.fluxo) {
            dados.fluxo.forEach((item) => appendMessage(item.content, "koda"));
          }
        } catch (erro) {
          appendMessage("Erro de conexão.", "koda");
        }
      }

      function falarTexto(texto) {
        window.speechSynthesis.cancel();
        if (texto.trim().startsWith("{")) return;

        let textoLimpo = texto.replace(/[\*`#\-]/g, "");
        const falar = new SpeechSynthesisUtterance(textoLimpo);
        falar.lang = "pt-BR";
        falar.rate = 1.05;

        const vozes = window.speechSynthesis.getVoices();
        let vozKoda =
          vozes.find((v) => v.lang === "pt-BR" && v.name.includes("Daniel")) ||
          vozes.find((v) => v.lang === "pt-BR");
        if (vozKoda) falar.voice = vozKoda;
        window.speechSynthesis.speak(falar);
      }

      window.speechSynthesis.onvoiceschanged = () =>
        window.speechSynthesis.getVoices();

      init();
    </script>
  </body>
</html>
